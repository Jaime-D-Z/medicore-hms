<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="utf-8"><title>Departments - HMS</title><meta name="viewport" content="width=device-width, initial-scale=1.0"><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<div class="main-content">
<div class="topbar"><h4><i class="fas fa-building" style="color:#13c5dd;margin-right:10px;"></i>Departments</h4><div class="user-info"><i class="fas fa-user-circle"></i> <span th:text="${#authentication.name}">User</span> <a href="/logout" class="ms-3 btn btn-sm btn-outline-danger"><i class="fas fa-sign-out-alt"></i> Logout</a></div></div>
<div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show"><span th:text="${successMessage}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
<div class="row">
<div class="col-md-4"><div class="card"><div class="card-header bg-white"><h5 class="mb-0"><i class="fas fa-plus-circle me-2" style="color:#13c5dd;"></i><span th:if="${department.deptId != null}">Edit</span><span th:unless="${department.deptId != null}">New</span> Department</h5></div><div class="card-body"><form th:action="@{/dashboard/departmentSave}" method="post"><input type="hidden" name="deptId" th:value="${department.deptId}"><div class="mb-3"><label class="form-label">Department Name</label><input type="text" name="deptName" class="form-control" th:value="${department.deptName}" required></div><div class="mb-3"><label class="form-label">Description</label><textarea name="description" class="form-control" th:text="${department.description}"></textarea></div><button type="submit" class="btn btn-primary w-100"><i class="fas fa-save"></i> Save</button></form></div></div></div>
<div class="col-md-8"><div class="card"><div class="card-body"><div class="table-responsive"><table class="table table-hover"><thead><tr><th>ID</th><th>Name</th><th>Description</th><th>Actions</th></tr></thead><tbody><tr th:each="d : ${departments}"><td th:text="${d.deptId}">1</td><td th:text="${d.deptName}">Cardiology</td><td th:text="${d.description}">-</td><td><a th:href="@{/dashboard/editDepartment/{id}(id=${d.deptId})}" class="btn btn-sm btn-warning"><i class="fas fa-edit"></i></a> <a th:href="@{/dashboard/deleteDepartment/{id}(id=${d.deptId})}" class="btn btn-sm btn-danger" onclick="return confirm('Delete?')"><i class="fas fa-trash"></i></a></td></tr></tbody></table></div></div></div></div></div>
</div>
<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
