<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="utf-8"><title>Staff - HMS</title><meta name="viewport" content="width=device-width, initial-scale=1.0"><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<div class="main-content">
<div class="topbar"><h4><i class="fas fa-users" style="color:#13c5dd;margin-right:10px;"></i>Staff Management</h4><div class="user-info"><i class="fas fa-user-circle"></i> <span th:text="${#authentication.name}">User</span> <a href="/logout" class="ms-3 btn btn-sm btn-outline-danger"><i class="fas fa-sign-out-alt"></i> Logout</a></div></div>
<div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show"><span th:text="${successMessage}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
<div class="row">
<div class="col-md-5"><div class="card"><div class="card-header bg-white"><h5 class="mb-0"><span th:if="${staff.staffId != null}">Edit</span><span th:unless="${staff.staffId != null}">New</span> Staff</h5></div><div class="card-body"><form th:action="@{/dashboard/staffSave}" method="post"><input type="hidden" name="staffId" th:value="${staff.staffId}"><div class="mb-2"><input type="text" name="fullName" class="form-control" placeholder="Full Name" th:value="${staff.fullName}" required></div><div class="mb-2"><input type="email" name="email" class="form-control" placeholder="Email" th:value="${staff.email}"></div><div class="mb-2"><input type="text" name="phone" class="form-control" placeholder="Phone" th:value="${staff.phone}"></div><div class="mb-2"><select name="roleId" class="form-select" required><option value="">Select Role</option><option th:each="r : ${roles}" th:value="${r.roleId}" th:text="${r.roleName}" th:selected="${staff.role?.roleId == r.roleId}"></option></select></div><div class="mb-2"><select name="deptId" class="form-select" required><option value="">Select Department</option><option th:each="d : ${departments}" th:value="${d.deptId}" th:text="${d.deptName}" th:selected="${staff.department?.deptId == d.deptId}"></option></select></div><div class="mb-2"><input type="number" step="0.01" name="salary" class="form-control" placeholder="Salary" th:value="${staff.salary}"></div><button type="submit" class="btn btn-primary w-100"><i class="fas fa-save"></i> Save</button></form></div></div></div>
<div class="col-md-7"><div class="card"><div class="card-body"><div class="table-responsive"><table class="table table-hover"><thead><tr><th>Name</th><th>Role</th><th>Department</th><th>Phone</th><th>Salary</th><th>Actions</th></tr></thead><tbody><tr th:each="s : ${staffList}"><td th:text="${s.fullName}">Name</td><td th:text="${s.role?.roleName}">Role</td><td th:text="${s.department?.deptName}">Dept</td><td th:text="${s.phone}">-</td><td th:text="${s.salary}">0</td><td><a th:href="@{/dashboard/editStaff/{id}(id=${s.staffId})}" class="btn btn-sm btn-warning"><i class="fas fa-edit"></i></a> <a th:href="@{/dashboard/deleteStaff/{id}(id=${s.staffId})}" class="btn btn-sm btn-danger" onclick="return confirm('Delete?')"><i class="fas fa-trash"></i></a></td></tr></tbody></table></div></div></div></div></div>
</div>
<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
