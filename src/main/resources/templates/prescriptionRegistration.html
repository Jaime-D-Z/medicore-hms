<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="utf-8"><title>Prescription - HMS</title><meta name="viewport" content="width=device-width, initial-scale=1.0"><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<div class="main-content">
<div class="topbar"><h4><i class="fas fa-prescription" style="color:#13c5dd;margin-right:10px;"></i>Prescription Registration</h4><div class="user-info"><i class="fas fa-user-circle"></i> <span th:text="${#authentication.name}">User</span> <a href="/logout" class="ms-3 btn btn-sm btn-outline-danger"><i class="fas fa-sign-out-alt"></i> Logout</a></div></div>
<div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show"><span th:text="${successMessage}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
<div class="row">
<div class="col-md-5"><div class="card"><div class="card-header bg-white"><h5 class="mb-0"><i class="fas fa-plus-circle me-2" style="color:#13c5dd;"></i><span th:if="${prescription.pid != null}">Edit</span><span th:unless="${prescription.pid != null}">New</span> Prescription</h5></div><div class="card-body"><form th:action="@{/dashboard/prsregistersubmit}" method="post"><input type="hidden" name="pid" th:value="${prescription.pid}">
<div class="mb-2"><select name="patientId" class="form-select" required><option value="">Select Patient</option><option th:each="p : ${patientList}" th:value="${p.patientId}" th:text="${p.patientName}" th:selected="${prescription.patient?.patientId == p.patientId}"></option></select></div>
<div class="mb-2"><select name="doctorId" class="form-select" required><option value="">Select Doctor</option><option th:each="d : ${doctorList}" th:value="${d.doctorId}" th:text="${d.dName}" th:selected="${prescription.doctor?.doctorId == d.doctorId}"></option></select></div>
<div class="mb-2"><input type="text" name="tablet" class="form-control" placeholder="Medicine Name" th:value="${prescription.tablet}"></div>
<div class="mb-2"><input type="text" name="dosage" class="form-control" placeholder="Dosage (e.g., 1-0-1)" th:value="${prescription.dosage}"></div>
<div class="mb-2"><input type="number" name="days" class="form-control" placeholder="Days" th:value="${prescription.days}"></div>
<div class="mb-2"><textarea name="prescriptionDetail" class="form-control" placeholder="Notes / Instructions" th:text="${prescription.prescriptionDetail}"></textarea></div>
<button type="submit" class="btn btn-primary w-100"><i class="fas fa-save"></i> Save</button></form></div></div></div>
<div class="col-md-7"><div class="card"><div class="card-body"><div class="table-responsive"><table class="table table-hover"><thead><tr><th>Patient</th><th>Doctor</th><th>Medicine</th><th>Dosage</th><th>Days</th><th>Date</th><th>Actions</th></tr></thead><tbody><tr th:each="p : ${latestPrescriptions}"><td th:text="${p.patient.patientName}">Patient</td><td th:text="${p.doctor.dName}">Doctor</td><td th:text="${p.tablet}">Med</td><td th:text="${p.dosage}">-</td><td th:text="${p.days}">0</td><td th:text="${p.prescribedDate}">-</td><td><a th:href="@{/dashboard/editPrescription/{id}(id=${p.pid})}" class="btn btn-sm btn-warning"><i class="fas fa-edit"></i></a> <a th:href="@{/dashboard/deletePrescription/{id}(id=${p.pid})}" class="btn btn-sm btn-danger" onclick="return confirm('Delete?')"><i class="fas fa-trash"></i></a></td></tr></tbody></table></div></div></div></div></div>
</div>
<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
