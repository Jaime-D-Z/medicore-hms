<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Receta - MediCore HMS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="main-content">
        <div class="topbar">
            <h4><i class="fas fa-prescription"></i>Registro de Receta</h4>
            <div class="user-info">
                <i class="fas fa-user-circle"></i>
                <span th:text="${#authentication.name}">Usuario</span>
                <form th:action="@{/logout}" method="post" style="display:inline;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" class="btn btn-sm btn-outline-danger ms-2"><i class="fas fa-sign-out-alt"></i> Salir</button>
                </form>
            </div>
        </div>
        <div style="padding: 24px 30px;">
            <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
                <span th:text="${successMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div class="row g-4">
                <div class="col-lg-5">
                    <div class="card">
                        <div class="card-header">
                            <h5><i class="fas fa-plus-circle"></i>
                                <span th:if="${prescription.pid != null}">Editar</span>
                                <span th:unless="${prescription.pid != null}">Nueva</span> Receta
                            </h5>
                        </div>
                        <div class="card-body">
                            <form th:action="@{/dashboard/prsregistersubmit}" method="post">
                                <input type="hidden" name="pid" th:value="${prescription.pid}">
                                <div class="mb-3">
                                    <label class="form-label">Paciente</label>
                                    <select name="patientId" class="form-select" required>
                                        <option value="">Seleccionar Paciente</option>
                                        <option th:each="p : ${patientList}" th:value="${p.patientId}" th:text="${p.patientName}" th:selected="${prescription.patient?.patientId == p.patientId}"></option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Doctor</label>
                                    <select name="doctorId" class="form-select" required>
                                        <option value="">Seleccionar Doctor</option>
                                        <option th:each="d : ${doctorList}" th:value="${d.doctorId}" th:text="${d.dName}" th:selected="${prescription.doctor?.doctorId == d.doctorId}"></option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Nombre Medicamento</label>
                                    <input type="text" name="tablet" class="form-control" placeholder="Nombre Medicamento" th:value="${prescription.tablet}">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Dosis</label>
                                    <input type="text" name="dosage" class="form-control" placeholder="ej. 1-0-1" th:value="${prescription.dosage}">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Días</label>
                                    <input type="number" name="days" class="form-control" placeholder="Días" th:value="${prescription.days}">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Notas / Instrucciones</label>
                                    <textarea name="prescriptionDetail" class="form-control" rows="2" placeholder="Notas / Instrucciones" th:text="${prescription.prescriptionDetail}"></textarea>
                                </div>
                                <button type="submit" class="btn btn-primary w-100"><i class="fas fa-save"></i> Guardar Receta</button>
                            </form>
                        </div>
                    </div>
                </div>
                <div class="col-lg-7">
                    <div class="card">
                        <div class="card-header">
                            <h5><i class="fas fa-list"></i>Ãšltimas Recetas</h5>
                        </div>
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover mb-0">
                                    <thead>
                                        <tr><th>Paciente</th><th>Doctor</th><th>Medicamento</th><th>Dosis</th><th>Días</th><th>Fecha</th><th>Acciones</th></tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="p : ${latestPrescriptions}">
                                            <td th:text="${p.patient.patientName}">Patient</td>
                                            <td th:text="${p.doctor.dName}">Doctor</td>
                                            <td th:text="${p.tablet}">Med</td>
                                            <td th:text="${p.dosage}">-</td>
                                            <td th:text="${p.days}">0</td>
                                            <td th:text="${p.prescribedDate}">-</td>
                                            <td>
                                                <a th:href="@{/dashboard/editPrescription/{id}(id=${p.pid})}" class="btn btn-sm btn-warning"><i class="fas fa-edit"></i></a>
                                                <a th:href="@{/dashboard/deletePrescription/{id}(id=${p.pid})}" class="btn btn-sm btn-danger" onclick="return confirm('¿Eliminar?')"><i class="fas fa-trash"></i></a>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
