<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="utf-8"><title>Test Results - HMS</title><meta name="viewport" content="width=device-width, initial-scale=1.0"><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<div class="main-content">
<div class="topbar"><h4><i class="fas fa-vial" style="color:#13c5dd;margin-right:10px;"></i>Test Results</h4><div class="user-info"><i class="fas fa-user-circle"></i> <span th:text="${#authentication.name}">User</span> <a href="/logout" class="ms-3 btn btn-sm btn-outline-danger"><i class="fas fa-sign-out-alt"></i> Logout</a></div></div>
<div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show"><span th:text="${successMessage}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
<div class="row">
<div class="col-md-5"><div class="card"><div class="card-header bg-white"><h5 class="mb-0">New Test Result</h5></div><div class="card-body"><form th:action="@{/dashboard/testResultSave}" method="post"><input type="hidden" name="resultId" th:value="${testResult.resultId}"><div class="mb-2"><select name="testId" class="form-select" required><option value="">Select Test</option><option th:each="t : ${labTests}" th:value="${t.testId}" th:text="${t.testName}" th:selected="${testResult.labTest?.testId == t.testId}"></option></select></div><div class="mb-2"><select name="patientId" class="form-select" required><option value="">Select Patient</option><option th:each="p : ${patients}" th:value="${p.patientId}" th:text="${p.patientName}" th:selected="${testResult.patient?.patientId == p.patientId}"></option></select></div><div class="mb-2"><select name="doctorId" class="form-select" required><option value="">Select Doctor</option><option th:each="d : ${doctors}" th:value="${d.doctorId}" th:text="${d.dName}" th:selected="${testResult.doctor?.doctorId == d.doctorId}"></option></select></div><div class="mb-2"><input type="text" name="result" class="form-control" placeholder="Result" th:value="${testResult.result}"></div><div class="mb-2"><input type="text" name="referenceRange" class="form-control" placeholder="Reference Range" th:value="${testResult.referenceRange}"></div><div class="mb-2"><textarea name="notes" class="form-control" placeholder="Notes" th:text="${testResult.notes}"></textarea></div><button type="submit" class="btn btn-primary w-100"><i class="fas fa-save"></i> Save</button></form></div></div></div>
<div class="col-md-7"><div class="card"><div class="card-body"><div class="table-responsive"><table class="table table-hover"><thead><tr><th>Test</th><th>Patient</th><th>Result</th><th>Date</th><th>Actions</th></tr></thead><tbody><tr th:each="r : ${results}"><td th:text="${r.labTest?.testName}">Test</td><td th:text="${r.patient?.patientName}">Patient</td><td th:text="${r.result}">-</td><td th:text="${r.testDate}">-</td><td><a th:href="@{/dashboard/deleteTestResult/{id}(id=${r.resultId})}" class="btn btn-sm btn-danger" onclick="return confirm('Delete?')"><i class="fas fa-trash"></i></a></td></tr></tbody></table></div></div></div></div></div>
</div>
<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
