<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Resultados - MediCore HMS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="main-content">
        <div class="topbar">
            <h4><i class="fas fa-vial"></i>Resultados</h4>
            <div class="user-info">
                <i class="fas fa-user-circle"></i>
                <span th:text="${#authentication.name}">Usuario</span>
                <form th:action="@{/logout}" method="post" style="display:inline;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" class="btn btn-sm btn-outline-danger ms-2"><i class="fas fa-sign-out-alt"></i> Salir</button>
                </form>
            </div>
        </div>
        <div style="padding: 24px 30px;">
            <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
                <span th:text="${successMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div class="row g-4">
                <div class="col-lg-5">
                    <div class="card">
                        <div class="card-header">
                            <h5><i class="fas fa-plus-circle"></i>Nuevo Resultado</h5>
                        </div>
                        <div class="card-body">
                            <form th:action="@{/dashboard/testResultSave}" method="post">
                                <input type="hidden" name="resultId" th:value="${testResult.resultId}">
                                <div class="mb-3">
                                    <label class="form-label">Examen</label>
                                    <select name="testId" class="form-select" required>
                                        <option value="">Seleccionar Examen</option>
                                        <option th:each="t : ${labTests}" th:value="${t.testId}" th:text="${t.testName}" th:selected="${testResult.labTest?.testId == t.testId}"></option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Paciente</label>
                                    <select name="patientId" class="form-select" required>
                                        <option value="">Seleccionar Paciente</option>
                                        <option th:each="p : ${patients}" th:value="${p.patientId}" th:text="${p.patientName}" th:selected="${testResult.patient?.patientId == p.patientId}"></option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Doctor</label>
                                    <select name="doctorId" class="form-select" required>
                                        <option value="">Seleccionar Doctor</option>
                                        <option th:each="d : ${doctors}" th:value="${d.doctorId}" th:text="${d.dName}" th:selected="${testResult.doctor?.doctorId == d.doctorId}"></option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Resultado</label>
                                    <input type="text" name="result" class="form-control" th:value="${testResult.result}">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Rango Referencia</label>
                                    <input type="text" name="referenceRange" class="form-control" th:value="${testResult.referenceRange}">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Notas</label>
                                    <textarea name="notes" class="form-control" rows="2" th:text="${testResult.notes}"></textarea>
                                </div>
                                <button type="submit" class="btn btn-primary w-100"><i class="fas fa-save"></i> Guardar Resultado</button>
                            </form>
                        </div>
                    </div>
                </div>
                <div class="col-lg-7">
                    <div class="card">
                        <div class="card-header">
                            <h5><i class="fas fa-list"></i>Todos los Resultados</h5>
                        </div>
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover mb-0">
                                    <thead>
                                        <tr><th>Examen</th><th>Paciente</th><th>Resultado</th><th>Fecha</th><th>Acciones</th></tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="r : ${results}">
                                            <td th:text="${r.labTest?.testName}">Test</td>
                                            <td th:text="${r.patient?.patientName}">Patient</td>
                                            <td th:text="${r.result}">-</td>
                                            <td th:text="${r.testDate}">-</td>
                                            <td>
                                                <a th:href="@{/dashboard/deleteTestResult/{id}(id=${r.resultId})}" class="btn btn-sm btn-danger" onclick="return confirm('¿Eliminar?')"><i class="fas fa-trash"></i></a>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
