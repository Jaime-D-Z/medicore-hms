<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"><title>All Doctors - HMS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<div class="main-content">
    <div class="topbar"><h4><i class="fas fa-user-md" style="color:#13c5dd;margin-right:10px;"></i>All Doctors</h4><div class="user-info"><i class="fas fa-user-circle"></i> <span th:text="${#authentication.name}">User</span> <a href="/logout" class="ms-3 btn btn-sm btn-outline-danger"><i class="fas fa-sign-out-alt"></i> Logout</a></div></div>
    <div class="card"><div class="card-body"><div class="table-responsive"><table class="table table-hover"><thead><tr><th>ID</th><th>Name</th><th>Specialization</th><th>Consult Charge</th><th>Salary</th><th>Department</th></tr></thead><tbody><tr th:each="d : ${doctors}"><td th:text="${d.doctorId}">1</td><td th:text="${d.dName}">Dr. Name</td><td th:text="${d.specialization}">General</td><td th:text="${d.consultCharge}">0</td><td th:text="${d.salary}">0</td><td th:text="${d.department?.deptName}">-</td></tr></tbody></table></div></div></div>
</div>
<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
