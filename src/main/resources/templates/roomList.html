<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="utf-8"><title>Rooms - HMS</title><meta name="viewport" content="width=device-width, initial-scale=1.0"><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<div class="main-content">
<div class="topbar"><h4><i class="fas fa-door-open" style="color:#13c5dd;margin-right:10px;"></i>Rooms</h4><div class="user-info"><i class="fas fa-user-circle"></i> <span th:text="${#authentication.name}">User</span> <a href="/logout" class="ms-3 btn btn-sm btn-outline-danger"><i class="fas fa-sign-out-alt"></i> Logout</a></div></div>
<div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show"><span th:text="${successMessage}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
<div class="row">
<div class="col-md-4"><div class="card"><div class="card-header bg-white"><h5 class="mb-0"><i class="fas fa-plus-circle me-2" style="color:#13c5dd;"></i>Room</h5></div><div class="card-body"><form th:action="@{/dashboard/roomSave}" method="post"><input type="hidden" name="roomId" th:value="${room.roomId}"><div class="mb-2"><label class="form-label">Room Number</label><input type="text" name="roomNumber" class="form-control" th:value="${room.roomNumber}" required></div><div class="mb-2"><label class="form-label">Type</label><select name="roomType" class="form-select"><option value="GENERAL" th:selected="${room.roomType == 'GENERAL'}">General</option><option value="PRIVATE" th:selected="${room.roomType == 'PRIVATE'}">Private</option><option value="ICU" th:selected="${room.roomType == 'ICU'}">ICU</option><option value="WARD" th:selected="${room.roomType == 'WARD'}">Ward</option></select></div><div class="mb-2"><label class="form-label">Charge/Day</label><input type="number" step="0.01" name="chargePerDay" class="form-control" th:value="${room.chargePerDay}"></div><div class="mb-2"><label class="form-label">Department</label><select name="deptId" class="form-select"><option value="">Select</option><option th:each="d : ${departments}" th:value="${d.deptId}" th:text="${d.deptName}" th:selected="${room.department?.deptId == d.deptId}"></option></select></div><button type="submit" class="btn btn-primary w-100"><i class="fas fa-save"></i> Save</button></form></div></div></div>
<div class="col-md-8"><div class="card"><div class="card-body"><div class="table-responsive"><table class="table table-hover"><thead><tr><th>Room</th><th>Type</th><th>Charge/Day</th><th>Department</th><th>Available</th><th>Actions</th></tr></thead><tbody><tr th:each="r : ${rooms}"><td th:text="${r.roomNumber}">101</td><td th:text="${r.roomType}">General</td><td th:text="${r.chargePerDay}">0</td><td th:text="${r.department?.deptName}">-</td><td><span th:if="${r.available}" class="badge bg-success">Yes</span><span th:unless="${r.available}" class="badge bg-danger">No</span></td><td><a th:href="@{/dashboard/editRoom/{id}(id=${r.roomId})}" class="btn btn-sm btn-warning"><i class="fas fa-edit"></i></a> <a th:href="@{/dashboard/deleteRoom/{id}(id=${r.roomId})}" class="btn btn-sm btn-danger" onclick="return confirm('Delete?')"><i class="fas fa-trash"></i></a></td></tr></tbody></table></div></div></div></div></div>
</div>
<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
