<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Habitaciones - MediCore HMS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="main-content">
        <div class="topbar">
            <h4><i class="fas fa-door-open"></i>Habitaciones</h4>
            <div class="user-info">
                <i class="fas fa-user-circle"></i>
                <span th:text="${#authentication.name}">Usuario</span>
                <form th:action="@{/logout}" method="post" style="display:inline;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" class="btn btn-sm btn-outline-danger ms-2"><i class="fas fa-sign-out-alt"></i> Salir</button>
                </form>
            </div>
        </div>
        <div style="padding: 24px 30px;">
            <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
                <span th:text="${successMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div class="row g-4">
                <div class="col-lg-4">
                    <div class="card">
                        <div class="card-header">
                             <h5><i class="fas fa-plus-circle"></i>Habitación</h5>
                        </div>
                        <div class="card-body">
                            <form th:action="@{/dashboard/roomSave}" method="post">
                                <input type="hidden" name="roomId" th:value="${room.roomId}">
                                <div class="mb-3">
                                    <label class="form-label">Número Hab.</label>
                                    <input type="text" name="roomNumber" class="form-control" th:value="${room.roomNumber}" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Tipo</label>
                                    <select name="roomType" class="form-select">
                                        <option value="GENERAL" th:selected="${room.roomType == 'GENERAL'}">General</option>
                                        <option value="PRIVATE" th:selected="${room.roomType == 'PRIVATE'}">Privada</option>
                                        <option value="ICU" th:selected="${room.roomType == 'ICU'}">UCI</option>
                                        <option value="WARD" th:selected="${room.roomType == 'WARD'}">Sala</option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Cargo/Día</label>
                                    <input type="number" step="0.01" name="chargePerDay" class="form-control" th:value="${room.chargePerDay}">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Departamento</label>
                                    <select name="deptId" class="form-select">
                                        <option value="">Seleccionar</option>
                                        <option th:each="d : ${departments}" th:value="${d.deptId}" th:text="${d.deptName}" th:selected="${room.department?.deptId == d.deptId}"></option>
                                    </select>
                                </div>
                                <button type="submit" class="btn btn-primary w-100"><i class="fas fa-save"></i> Guardar Habitación</button>
                            </form>
                        </div>
                    </div>
                </div>
                <div class="col-lg-8">
                    <div class="card">
                        <div class="card-header">
                             <h5><i class="fas fa-list"></i>Todas las Habitaciones</h5>
                        </div>
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover mb-0">
                                    <thead>
                                        <tr><th>Hab.</th><th>Tipo</th><th>Cargo/Día</th><th>Departamento</th><th>Disponible</th><th>Acciones</th></tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="r : ${rooms}">
                                            <td th:text="${r.roomNumber}">101</td>
                                            <td><span class="badge bg-primary" th:text="${r.roomType}">General</span></td>
                                            <td th:text="${r.chargePerDay}">0</td>
                                            <td th:text="${r.department?.deptName}">-</td>
                                            <td>
                                                <span th:if="${r.available}" class="badge bg-success">Sí</span>
                                                <span th:unless="${r.available}" class="badge bg-danger">No</span>
                                            </td>
                                            <td>
                                                <a th:href="@{/dashboard/editRoom/{id}(id=${r.roomId})}" class="btn btn-sm btn-warning"><i class="fas fa-edit"></i></a>
                                                <a th:href="@{/dashboard/deleteRoom/{id}(id=${r.roomId})}" class="btn btn-sm btn-danger" onclick="return confirm('¿Eliminar?')"><i class="fas fa-trash"></i></a>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
