<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="utf-8"><title>Beds - HMS</title><meta name="viewport" content="width=device-width, initial-scale=1.0"><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<div class="main-content">
<div class="topbar"><h4><i class="fas fa-bed" style="color:#13c5dd;margin-right:10px;"></i>Beds</h4><div class="user-info"><i class="fas fa-user-circle"></i> <span th:text="${#authentication.name}">User</span> <a href="/logout" class="ms-3 btn btn-sm btn-outline-danger"><i class="fas fa-sign-out-alt"></i> Logout</a></div></div>
<div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show"><span th:text="${successMessage}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
<div class="row">
<div class="col-md-4"><div class="card"><div class="card-header bg-white"><h5 class="mb-0"><i class="fas fa-plus-circle me-2" style="color:#13c5dd;"></i>Bed</h5></div><div class="card-body"><form th:action="@{/dashboard/bedSave}" method="post"><input type="hidden" name="bedId" th:value="${bed.bedId}"><div class="mb-2"><label class="form-label">Bed Number</label><input type="text" name="bedNumber" class="form-control" th:value="${bed.bedNumber}" required></div><div class="mb-2"><label class="form-label">Room</label><select name="roomId" class="form-select" required><option value="">Select Room</option><option th:each="r : ${rooms}" th:value="${r.roomId}" th:text="${r.roomNumber}" th:selected="${bed.room?.roomId == r.roomId}"></option></select></div><div class="mb-2"><label class="form-label">Patient (optional)</label><select name="patientId" class="form-select"><option value="">-- Empty --</option><option th:each="p : ${patients}" th:value="${p.patientId}" th:text="${p.patientName}" th:selected="${bed.patient?.patientId == p.patientId}"></option></select></div><button type="submit" class="btn btn-primary w-100"><i class="fas fa-save"></i> Save</button></form></div></div></div>
<div class="col-md-8"><div class="card"><div class="card-body"><div class="table-responsive"><table class="table table-hover"><thead><tr><th>Bed</th><th>Room</th><th>Patient</th><th>Status</th><th>Actions</th></tr></thead><tbody><tr th:each="b : ${beds}"><td th:text="${b.bedNumber}">B1</td><td th:text="${b.room?.roomNumber}">101</td><td th:text="${b.patient?.patientName}">-</td><td><span th:text="${b.status}" th:classappend="${b.status == 'AVAILABLE'} ? 'badge bg-success' : 'badge bg-warning'">Status</span></td><td><a th:href="@{/dashboard/editBed/{id}(id=${b.bedId})}" class="btn btn-sm btn-warning"><i class="fas fa-edit"></i></a> <a th:href="@{/dashboard/vacateBed/{id}(id=${b.bedId})}" class="btn btn-sm btn-info"><i class="fas fa-bed"></i></a> <a th:href="@{/dashboard/deleteBed/{id}(id=${b.bedId})}" class="btn btn-sm btn-danger" onclick="return confirm('Delete?')"><i class="fas fa-trash"></i></a></td></tr></tbody></table></div></div></div></div></div>
</div>
<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
