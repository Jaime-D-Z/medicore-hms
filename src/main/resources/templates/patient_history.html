<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="utf-8"><title>Patient History - HMS</title><meta name="viewport" content="width=device-width, initial-scale=1.0"><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<div class="main-content">
<div class="topbar"><h4><i class="fas fa-history" style="color:#13c5dd;margin-right:10px;"></i>Patient History</h4><div class="user-info"><i class="fas fa-user-circle"></i> <span th:text="${#authentication.name}">User</span> <a href="/logout" class="ms-3 btn btn-sm btn-outline-danger"><i class="fas fa-sign-out-alt"></i> Logout</a></div></div>

<div class="row">
<div class="col-md-4"><div class="card"><div class="card-header bg-white"><h5 class="mb-0">Select Patient</h5></div><div class="card-body">
<div class="list-group"><a th:each="p : ${patients}" th:href="@{/dashboard/history(id=${p.patientId})}" class="list-group-item list-group-item-action" th:text="${p.patientName}">Patient</a></div>
</div></div></div>

<div class="col-md-8" th:if="${patient}">
<div class="card"><div class="card-header bg-white"><h5 class="mb-0"><i class="fas fa-user-injured me-2" style="color:#13c5dd;"></i><span th:text="${patient.patientName}">Patient</span></h5></div><div class="card-body">
<p><strong>Age:</strong> <span th:text="${patient.age}">-</span> | <strong>Gender:</strong> <span th:text="${patient.gender}">-</span> | <strong>Phone:</strong> <span th:text="${patient.phone}">-</span> | <strong>Admission:</strong> <span th:text="${patient.admissionDate}">-</span></p>
<hr>
<h6>Medical Records</h6>
<div class="table-responsive"><table class="table table-hover"><thead><tr><th>Date</th><th>Doctor</th><th>Diagnosis</th><th>Treatment</th><th>Action</th></tr></thead>
<tbody><tr th:each="r : ${records}"><td th:text="${r.visitDate}">-</td><td th:text="${r.doctor?.dName}">Dr</td><td th:text="${r.diagnosis}">-</td><td th:text="${r.treatment}">-</td><td><a th:href="@{/dashboard/viewMedicalRecord/{id}(id=${r.recordId})}" class="btn btn-sm btn-info"><i class="fas fa-eye"></i></a></td></tr>
<tr th:if="${#lists.isEmpty(records)}"><td colspan="5" class="text-center">No records found</td></tr>
</tbody></table></div>
</div></div></div>
</div>
</div>
<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
