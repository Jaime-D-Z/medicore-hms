<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Historial del Paciente - MediCore HMS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="main-content">
        <div class="topbar">
            <h4><i class="fas fa-history"></i>Historial del Paciente</h4>
            <div class="user-info">
                <i class="fas fa-user-circle"></i>
                <span th:text="${#authentication.name}">Usuario</span>
                <form th:action="@{/logout}" method="post" style="display:inline;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" class="btn btn-sm btn-outline-danger ms-2"><i class="fas fa-sign-out-alt"></i> Salir</button>
                </form>
            </div>
        </div>
        <div style="padding: 24px 30px;">
            <div class="row g-4">
                <div class="col-lg-4">
                    <div class="card">
                        <div class="card-header">
                            <h5><i class="fas fa-users"></i>Seleccionar Paciente</h5>
                        </div>
                        <div class="card-body p-0">
                            <div class="list-group list-group-flush">
                                <a th:each="p : ${patients}" th:href="@{/dashboard/history(id=${p.patientId})}" class="list-group-item list-group-item-action" th:text="${p.patientName}">Patient</a>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-lg-8" th:if="${patient}">
                    <div class="card">
                        <div class="card-header">
                            <h5><i class="fas fa-user-injured"></i><span th:text="${patient.patientName}">Patient</span></h5>
                        </div>
                        <div class="card-body">
                            <p class="mb-3">
                                <span class="me-3"><strong>Edad:</strong> <span th:text="${patient.age}">-</span></span>
                                <span class="me-3"><strong>Género:</strong> <span th:text="${patient.gender}">-</span></span>
                                <span class="me-3"><strong>Teléfono:</strong> <span th:text="${patient.phone}">-</span></span>
                                <span><strong>Ingreso:</strong> <span th:text="${patient.admissionDate}">-</span></span>
                            </p>
                            <h6 class="fw-bold mb-3">Historiales Médicos</h6>
                            <div class="table-responsive">
                                <table class="table table-hover mb-0">
                                    <thead>
                                        <tr><th>Fecha</th><th>Doctor</th><th>Diagnóstico</th><th>Tratamiento</th><th>Acción</th></tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="r : ${records}">
                                            <td th:text="${r.visitDate}">-</td>
                                            <td th:text="${r.doctor?.dName}">Dr</td>
                                            <td th:text="${r.diagnosis}">-</td>
                                            <td th:text="${r.treatment}">-</td>
                                            <td><a th:href="@{/dashboard/viewMedicalRecord/{id}(id=${r.recordId})}" class="btn btn-sm btn-info"><i class="fas fa-eye"></i></a></td>
                                        </tr>
                                        <tr th:if="${#lists.isEmpty(records)}">
                                            <td colspan="5" class="text-center text-muted py-3">Sin registros para este paciente</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
