<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="utf-8"><title>Medicines - HMS</title><meta name="viewport" content="width=device-width, initial-scale=1.0"><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<div class="main-content">
<div class="topbar"><h4><i class="fas fa-pills" style="color:#13c5dd;margin-right:10px;"></i>Medicines</h4><div class="user-info"><i class="fas fa-user-circle"></i> <span th:text="${#authentication.name}">User</span> <a href="/logout" class="ms-3 btn btn-sm btn-outline-danger"><i class="fas fa-sign-out-alt"></i> Logout</a></div></div>
<div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show"><span th:text="${successMessage}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
<div class="row">
<div class="col-md-4"><div class="card"><div class="card-header bg-white"><h5 class="mb-0"><i class="fas fa-plus-circle me-2" style="color:#13c5dd;"></i>Medicine</h5></div><div class="card-body"><form th:action="@{/dashboard/medicineSave}" method="post"><input type="hidden" name="medicineId" th:value="${medicine.medicineId}"><div class="mb-2"><label class="form-label">Name</label><input type="text" name="name" class="form-control" th:value="${medicine.name}" required></div><div class="mb-2"><label class="form-label">Brand</label><input type="text" name="brand" class="form-control" th:value="${medicine.brand}"></div><div class="mb-2"><label class="form-label">Category</label><select name="category" class="form-select"><option value="TABLET" th:selected="${medicine.category == 'TABLET'}">Tablet</option><option value="SYRUP" th:selected="${medicine.category == 'SYRUP'}">Syrup</option><option value="INJECTION" th:selected="${medicine.category == 'INJECTION'}">Injection</option><option value="CREAM" th:selected="${medicine.category == 'CREAM'}">Cream</option><option value="OTHER" th:selected="${medicine.category == 'OTHER'}">Other</option></select></div><div class="mb-2"><label class="form-label">Price</label><input type="number" step="0.01" name="price" class="form-control" th:value="${medicine.price}"></div><div class="mb-2"><label class="form-label">Description</label><textarea name="description" class="form-control" th:text="${medicine.description}"></textarea></div><button type="submit" class="btn btn-primary w-100"><i class="fas fa-save"></i> Save</button></form></div></div></div>
<div class="col-md-8"><div class="card"><div class="card-body"><div class="table-responsive"><table class="table table-hover"><thead><tr><th>Name</th><th>Brand</th><th>Category</th><th>Price</th><th>Actions</th></tr></thead><tbody><tr th:each="m : ${medicines}"><td th:text="${m.name}">Paracetamol</td><td th:text="${m.brand}">-</td><td th:text="${m.category}">TABLET</td><td th:text="${m.price}">0</td><td><a th:href="@{/dashboard/editMedicine/{id}(id=${m.medicineId})}" class="btn btn-sm btn-warning"><i class="fas fa-edit"></i></a> <a th:href="@{/dashboard/deleteMedicine/{id}(id=${m.medicineId})}" class="btn btn-sm btn-danger" onclick="return confirm('Delete?')"><i class="fas fa-trash"></i></a></td></tr></tbody></table></div></div></div></div></div>
</div>
<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
