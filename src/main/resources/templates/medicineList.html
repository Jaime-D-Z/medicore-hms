<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Medicamentos - MediCore HMS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="main-content">
        <div class="topbar">
            <h4><i class="fas fa-pills"></i>Medicamentos</h4>
            <div class="user-info">
                <i class="fas fa-user-circle"></i>
                <span th:text="${#authentication.name}">Usuario</span>
                <form th:action="@{/logout}" method="post" style="display:inline;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" class="btn btn-sm btn-outline-danger ms-2"><i class="fas fa-sign-out-alt"></i> Salir</button>
                </form>
            </div>
        </div>
        <div style="padding: 24px 30px;">
            <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
                <span th:text="${successMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div class="row g-4">
                <div class="col-lg-4">
                    <div class="card">
                        <div class="card-header">
                             <h5><i class="fas fa-plus-circle"></i>Medicamento</h5>
                        </div>
                        <div class="card-body">
                            <form th:action="@{/dashboard/medicineSave}" method="post">
                                <input type="hidden" name="medicineId" th:value="${medicine.medicineId}">
                                <div class="mb-3">
                                    <label class="form-label">Nombre</label>
                                    <input type="text" name="name" class="form-control" th:value="${medicine.name}" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Marca</label>
                                    <input type="text" name="brand" class="form-control" th:value="${medicine.brand}">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Categoría</label>
                                    <select name="category" class="form-select">
                                        <option value="TABLET" th:selected="${medicine.category == 'TABLET'}">Tableta</option>
                                        <option value="SYRUP" th:selected="${medicine.category == 'SYRUP'}">Jarabe</option>
                                        <option value="INJECTION" th:selected="${medicine.category == 'INJECTION'}">Inyección</option>
                                        <option value="CREAM" th:selected="${medicine.category == 'CREAM'}">Crema</option>
                                        <option value="OTHER" th:selected="${medicine.category == 'OTHER'}">Otro</option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Precio</label>
                                    <input type="number" step="0.01" name="price" class="form-control" th:value="${medicine.price}">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Descripción</label>
                                    <textarea name="description" class="form-control" rows="2" th:text="${medicine.description}"></textarea>
                                </div>
                                <button type="submit" class="btn btn-primary w-100"><i class="fas fa-save"></i> Guardar Medicamento</button>
                            </form>
                        </div>
                    </div>
                </div>
                <div class="col-lg-8">
                    <div class="card">
                        <div class="card-header">
                             <h5><i class="fas fa-list"></i>Todos los Medicamentos</h5>
                        </div>
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover mb-0">
                                    <thead>
                                        <tr><th>Nombre</th><th>Marca</th><th>Categoría</th><th>Precio</th><th>Acciones</th></tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="m : ${medicines}">
                                            <td th:text="${m.name}">Paracetamol</td>
                                            <td th:text="${m.brand}">-</td>
                                            <td><span class="badge bg-info" th:text="${m.category}">TABLET</span></td>
                                            <td th:text="${m.price}">0</td>
                                            <td>
                                                <a th:href="@{/dashboard/editMedicine/{id}(id=${m.medicineId})}" class="btn btn-sm btn-warning"><i class="fas fa-edit"></i></a>
                                                <a th:href="@{/dashboard/deleteMedicine/{id}(id=${m.medicineId})}" class="btn btn-sm btn-danger" onclick="return confirm('¿Eliminar?')"><i class="fas fa-trash"></i></a>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
