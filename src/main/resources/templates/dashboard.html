<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="utf-8">
    <title>Panel - MediCore HMS</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="main-content">
        <div class="topbar">
            <h4><i class="fas fa-tachometer-alt"></i>Panel Principal</h4>
            <div class="user-info">
                <i class="fas fa-user-circle"></i>
                <span th:text="${#authentication.name}">User</span>
                <form th:action="@{/logout}" method="post" style="display:inline;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" class="btn btn-sm btn-outline-danger ms-2"><i class="fas fa-sign-out-alt"></i> Salir</button>
                </form>
            </div>
        </div>

        <div style="padding: 24px 30px;">
            <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
                <span th:text="${successMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="row g-3">
                <div class="col-xl-3 col-md-6" th:if="${isAdmin or isReceptionist or isDoctor or isNurse}">
                    <div class="stat-card stat-blue">
                        <div class="d-flex justify-content-between align-items-start">
                            <div class="stat-content">
                                <div class="stat-number" th:text="${totalPatients}">0</div>
                                <div class="stat-label">Total Pacientes</div>
                            </div>
                            <i class="fas fa-user-injured"></i>
                        </div>
                    </div>
                </div>
                <div class="col-xl-3 col-md-6" th:if="${isAdmin or isReceptionist}">
                    <div class="stat-card stat-indigo">
                        <div class="d-flex justify-content-between align-items-start">
                            <div class="stat-content">
                                <div class="stat-number" th:text="${totalDoctors}">0</div>
                                <div class="stat-label">Total Doctores</div>
                            </div>
                            <i class="fas fa-user-md"></i>
                        </div>
                    </div>
                </div>
                <div class="col-xl-3 col-md-6" th:if="${isAdmin or isDoctor or isReceptionist}">
                    <div class="stat-card stat-teal">
                        <div class="d-flex justify-content-between align-items-start">
                            <div class="stat-content">
                                <div class="stat-number" th:text="${totalPrescriptions}">0</div>
                                <div class="stat-label">Recetas</div>
                            </div>
                            <i class="fas fa-prescription"></i>
                        </div>
                    </div>
                </div>
                <div class="col-xl-3 col-md-6" th:if="${isAdmin or isReceptionist}">
                    <div class="stat-card stat-cyan">
                        <div class="d-flex justify-content-between align-items-start">
                            <div class="stat-content">
                                <div class="stat-number" th:text="${totalBills}">0</div>
                                <div class="stat-label">Total Facturas</div>
                            </div>
                            <i class="fas fa-file-invoice-dollar"></i>
                        </div>
                    </div>
                </div>
                <div class="col-xl-3 col-md-6" th:if="${isAdmin or isDoctor or isReceptionist or isNurse}">
                    <div class="stat-card stat-green">
                        <div class="d-flex justify-content-between align-items-start">
                            <div class="stat-content">
                                <div class="stat-number" th:text="${scheduledAppointments}">0</div>
                                <div class="stat-label">Citas Programadas</div>
                            </div>
                            <i class="fas fa-calendar-check"></i>
                        </div>
                    </div>
                </div>
                <div class="col-xl-3 col-md-6" th:if="${isAdmin or isReceptionist}">
                    <div class="stat-card stat-pink">
                        <div class="d-flex justify-content-between align-items-start">
                            <div class="stat-content">
                                <div class="stat-number" th:text="${pendingBills}">0</div>
                                <div class="stat-label">Facturas Pendientes</div>
                            </div>
                            <i class="fas fa-clock"></i>
                        </div>
                    </div>
                </div>
                <div class="col-xl-3 col-md-6" th:if="${isAdmin or isNurse or isReceptionist}">
                    <div class="stat-card stat-purple">
                        <div class="d-flex justify-content-between align-items-start">
                            <div class="stat-content">
                                <div class="stat-number" th:text="${availableRooms}">0</div>
                                <div class="stat-label">Habitaciones Disponibles</div>
                            </div>
                            <i class="fas fa-door-open"></i>
                        </div>
                    </div>
                </div>
                <div class="col-xl-3 col-md-6" th:if="${isAdmin or isNurse or isReceptionist}">
                    <div class="stat-card stat-orange">
                        <div class="d-flex justify-content-between align-items-start">
                            <div class="stat-content">
                                <div class="stat-number" th:text="${availableBeds}">0</div>
                                <div class="stat-label">Camas Disponibles</div>
                            </div>
                            <i class="fas fa-bed"></i>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row mt-4" sec:authorize="hasRole('ADMIN') or hasRole('RECEPTIONIST')">
                <div class="col-12">
                    <div class="card">
                        <div class="card-header">
                            <h5><i class="fas fa-link"></i>Acciones Rápidas</h5>
                        </div>
                        <div class="card-body">
                            <div class="row g-3">
                                <div class="col-md-3 col-6">
                                    <a href="/dashboard/pregister" class="quick-action-card">
                                        <i class="fas fa-user-injured"></i>
                                        <span>Nuevo Paciente</span>
                                    </a>
                                </div>
                                <div class="col-md-3 col-6" sec:authorize="hasRole('ADMIN')">
                                    <a href="/dashboard/dRegistration" class="quick-action-card">
                                        <i class="fas fa-user-md"></i>
                                        <span>Nuevo Doctor</span>
                                    </a>
                                </div>
                                <div class="col-md-3 col-6">
                                    <a href="/dashboard/appointments" class="quick-action-card">
                                        <i class="fas fa-calendar-plus"></i>
                                        <span>Citas</span>
                                    </a>
                                </div>
                                <div class="col-md-3 col-6">
                                    <a href="/dashboard/patientbillRegistration" class="quick-action-card">
                                        <i class="fas fa-file-invoice"></i>
                                        <span>Nueva Factura</span>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row g-4 mt-2">
                <div class="col-xl-4 col-md-6" sec:authorize="hasRole('ADMIN') or hasRole('DOCTOR') or hasRole('RECEPTIONIST') or hasRole('NURSE')">
                    <div class="card">
                        <div class="card-header">
                            <h5><i class="fas fa-calendar-check"></i>Citas por Estado</h5>
                        </div>
                        <div class="card-body">
                            <canvas id="chartAppointments" height="220"></canvas>
                        </div>
                    </div>
                </div>
                <div class="col-xl-4 col-md-6" sec:authorize="hasRole('ADMIN') or hasRole('RECEPTIONIST')">
                    <div class="card">
                        <div class="card-header">
                            <h5><i class="fas fa-file-invoice-dollar"></i>Facturas</h5>
                        </div>
                        <div class="card-body">
                            <canvas id="chartBills" height="220"></canvas>
                        </div>
                    </div>
                </div>
                <div class="col-xl-4 col-md-6" sec:authorize="hasRole('ADMIN') or hasRole('RECEPTIONIST') or hasRole('NURSE')">
                    <div class="card">
                        <div class="card-header">
                            <h5><i class="fas fa-door-open"></i>Habitaciones</h5>
                        </div>
                        <div class="card-body">
                            <canvas id="chartRooms" height="220"></canvas>
                        </div>
                    </div>
                </div>
                <div class="col-xl-4 col-md-6" sec:authorize="hasRole('ADMIN') or hasRole('RECEPTIONIST') or hasRole('NURSE')">
                    <div class="card">
                        <div class="card-header">
                            <h5><i class="fas fa-bed"></i>Camas</h5>
                        </div>
                        <div class="card-body">
                            <canvas id="chartBeds" height="220"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function () {
        var isAdmin = /*[[${isAdmin}]]*/ false;
        var isReceptionist = /*[[${isReceptionist}]]*/ false;
        var isDoctor = /*[[${isDoctor}]]*/ false;
        var isNurse = /*[[${isNurse}]]*/ false;

        var scheduled = /*[[${scheduledAppointments}]]*/ 0;
        var completed = /*[[${completedAppointments}]]*/ 0;
        var cancelled = /*[[${cancelledAppointments}]]*/ 0;

        // ---- Citas por Estado (Donut) ----
        if (document.getElementById('chartAppointments')) {
            new Chart(document.getElementById('chartAppointments'), {
                type: 'doughnut',
                data: {
                    labels: ['Programadas', 'Completadas', 'Canceladas'],
                    datasets: [{
                        data: [scheduled, completed, cancelled],
                        backgroundColor: ['#f59e0b', '#10b981', '#ef4444'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { position: 'bottom', labels: { padding: 16, usePointStyle: true } }
                    }
                }
            });
        }

        // ---- Facturas Pagadas vs Pendientes ----
        if (document.getElementById('chartBills')) {
            var paid = /*[[${paidBills}]]*/ 0;
            var unpaid = /*[[${pendingBills}]]*/ 0;
            new Chart(document.getElementById('chartBills'), {
                type: 'doughnut',
                data: {
                    labels: ['Pagadas', 'Pendientes'],
                    datasets: [{
                        data: [paid, unpaid],
                        backgroundColor: ['#10b981', '#f59e0b'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { position: 'bottom', labels: { padding: 16, usePointStyle: true } }
                    }
                }
            });
        }

        // ---- Habitaciones Disponibles vs Totales ----
        if (document.getElementById('chartRooms')) {
            var availRooms = /*[[${availableRooms}]]*/ 0;
            var totalRooms = /*[[${totalRooms}]]*/ 0;
            var occupiedRooms = totalRooms - availRooms;
            new Chart(document.getElementById('chartRooms'), {
                type: 'bar',
                data: {
                    labels: ['Habitaciones'],
                    datasets: [
                        { label: 'Disponibles', data: [availRooms], backgroundColor: '#10b981', borderRadius: 4 },
                        { label: 'Ocupadas', data: [occupiedRooms], backgroundColor: '#f59e0b', borderRadius: 4 }
                    ]
                },
                options: {
                    responsive: true,
                    scales: { x: { stacked: true }, y: { stacked: true, beginAtZero: true, ticks: { stepSize: 1 } } },
                    plugins: { legend: { position: 'bottom', labels: { padding: 16, usePointStyle: true } } }
                }
            });
        }

        // ---- Camas Disponibles vs Ocupadas ----
        if (document.getElementById('chartBeds')) {
            var availBeds = /*[[${availableBeds}]]*/ 0;
            var occupBeds = /*[[${occupiedBeds}]]*/ 0;
            new Chart(document.getElementById('chartBeds'), {
                type: 'bar',
                data: {
                    labels: ['Camas'],
                    datasets: [
                        { label: 'Disponibles', data: [availBeds], backgroundColor: '#10b981', borderRadius: 4 },
                        { label: 'Ocupadas', data: [occupBeds], backgroundColor: '#6366f1', borderRadius: 4 }
                    ]
                },
                options: {
                    responsive: true,
                    scales: { x: { stacked: true }, y: { stacked: true, beginAtZero: true, ticks: { stepSize: 1 } } },
                    plugins: { legend: { position: 'bottom', labels: { padding: 16, usePointStyle: true } } }
                }
            });
        }
    });
    </script>
</body>
</html>
