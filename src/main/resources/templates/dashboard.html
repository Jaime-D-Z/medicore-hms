<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="utf-8">
    <title>Panel - MediCore HMS</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="main-content">
        <div class="topbar">
            <h4><i class="fas fa-tachometer-alt"></i>Panel Principal</h4>
            <div class="user-info">
                <i class="fas fa-user-circle"></i>
                <span th:text="${#authentication.name}">User</span>
                <form th:action="@{/logout}" method="post" style="display:inline;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" class="btn btn-sm btn-outline-danger ms-2"><i class="fas fa-sign-out-alt"></i> Salir</button>
                </form>
            </div>
        </div>

        <div style="padding: 24px 30px;">
            <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
                <span th:text="${successMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="row g-3">
                <div class="col-xl-3 col-md-6" th:if="${isAdmin or isReceptionist or isDoctor or isNurse}">
                    <div class="stat-card stat-blue">
                        <div class="d-flex justify-content-between align-items-start">
                            <div class="stat-content">
                                <div class="stat-number" th:text="${totalPatients}">0</div>
                                <div class="stat-label">Total Pacientes</div>
                            </div>
                            <i class="fas fa-user-injured"></i>
                        </div>
                    </div>
                </div>
                <div class="col-xl-3 col-md-6" th:if="${isAdmin or isReceptionist}">
                    <div class="stat-card stat-indigo">
                        <div class="d-flex justify-content-between align-items-start">
                            <div class="stat-content">
                                <div class="stat-number" th:text="${totalDoctors}">0</div>
                                <div class="stat-label">Total Doctores</div>
                            </div>
                            <i class="fas fa-user-md"></i>
                        </div>
                    </div>
                </div>
                <div class="col-xl-3 col-md-6" th:if="${isAdmin or isDoctor or isReceptionist}">
                    <div class="stat-card stat-teal">
                        <div class="d-flex justify-content-between align-items-start">
                            <div class="stat-content">
                                <div class="stat-number" th:text="${totalPrescriptions}">0</div>
                                <div class="stat-label">Recetas</div>
                            </div>
                            <i class="fas fa-prescription"></i>
                        </div>
                    </div>
                </div>
                <div class="col-xl-3 col-md-6" th:if="${isAdmin or isReceptionist}">
                    <div class="stat-card stat-cyan">
                        <div class="d-flex justify-content-between align-items-start">
                            <div class="stat-content">
                                <div class="stat-number" th:text="${totalBills}">0</div>
                                <div class="stat-label">Total Facturas</div>
                            </div>
                            <i class="fas fa-file-invoice-dollar"></i>
                        </div>
                    </div>
                </div>
                <div class="col-xl-3 col-md-6" th:if="${isAdmin or isDoctor or isReceptionist or isNurse}">
                    <div class="stat-card stat-green">
                        <div class="d-flex justify-content-between align-items-start">
                            <div class="stat-content">
                                <div class="stat-number" th:text="${scheduledAppointments}">0</div>
                                <div class="stat-label">Citas Programadas</div>
                            </div>
                            <i class="fas fa-calendar-check"></i>
                        </div>
                    </div>
                </div>
                <div class="col-xl-3 col-md-6" th:if="${isAdmin or isReceptionist}">
                    <div class="stat-card stat-pink">
                        <div class="d-flex justify-content-between align-items-start">
                            <div class="stat-content">
                                <div class="stat-number" th:text="${pendingBills}">0</div>
                                <div class="stat-label">Facturas Pendientes</div>
                            </div>
                            <i class="fas fa-clock"></i>
                        </div>
                    </div>
                </div>
                <div class="col-xl-3 col-md-6" th:if="${isAdmin or isNurse or isReceptionist}">
                    <div class="stat-card stat-purple">
                        <div class="d-flex justify-content-between align-items-start">
                            <div class="stat-content">
                                <div class="stat-number" th:text="${availableRooms}">0</div>
                                <div class="stat-label">Habitaciones Disponibles</div>
                            </div>
                            <i class="fas fa-door-open"></i>
                        </div>
                    </div>
                </div>
                <div class="col-xl-3 col-md-6" th:if="${isAdmin or isNurse or isReceptionist}">
                    <div class="stat-card stat-orange">
                        <div class="d-flex justify-content-between align-items-start">
                            <div class="stat-content">
                                <div class="stat-number" th:text="${availableBeds}">0</div>
                                <div class="stat-label">Camas Disponibles</div>
                            </div>
                            <i class="fas fa-bed"></i>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row mt-4" sec:authorize="hasRole('ADMIN') or hasRole('RECEPTIONIST')">
                <div class="col-12">
                    <div class="card">
                        <div class="card-header">
                            <h5><i class="fas fa-link"></i>Acciones Rápidas</h5>
                        </div>
                        <div class="card-body">
                            <div class="row g-3">
                                <div class="col-md-3 col-6">
                                    <a href="/dashboard/pregister" class="quick-action-card">
                                        <i class="fas fa-user-injured"></i>
                                        <span>Nuevo Paciente</span>
                                    </a>
                                </div>
                                <div class="col-md-3 col-6" sec:authorize="hasRole('ADMIN')">
                                    <a href="/dashboard/dRegistration" class="quick-action-card">
                                        <i class="fas fa-user-md"></i>
                                        <span>Nuevo Doctor</span>
                                    </a>
                                </div>
                                <div class="col-md-3 col-6">
                                    <a href="/dashboard/appointments" class="quick-action-card">
                                        <i class="fas fa-calendar-plus"></i>
                                        <span>Citas</span>
                                    </a>
                                </div>
                                <div class="col-md-3 col-6">
                                    <a href="/dashboard/patientbillRegistration" class="quick-action-card">
                                        <i class="fas fa-file-invoice"></i>
                                        <span>Nueva Factura</span>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
