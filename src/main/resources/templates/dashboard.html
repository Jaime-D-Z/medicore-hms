<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="utf-8">
    <title>Dashboard - Hospital Management System</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f6f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .stat-card { border-radius: 10px; padding: 20px; color: #fff; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,.1); }
        .stat-card i { font-size: 40px; opacity: .8; }
        .stat-card .number { font-size: 32px; font-weight: 700; }
        .stat-card .label { font-size: 14px; opacity: .9; }
        .bg-blue { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .bg-green { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
        .bg-orange { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .bg-teal { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .bg-purple { background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%); }
        .bg-red { background: linear-gradient(135deg, #ff0844 0%, #ffb199 100%); }
        .bg-dark-blue { background: linear-gradient(135deg, #0c3483 0%, #a2b6df 100%); }
        .bg-warm { background: linear-gradient(135deg, #f7971e 0%, #ffd200 100%); }
    </style>
</head>
<body>
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="main-content">
        <div class="topbar">
            <h4><i class="fas fa-tachometer-alt" style="color:#13c5dd;margin-right:10px;"></i>Dashboard</h4>
            <div class="user-info">
                <i class="fas fa-user-circle"></i>
                <span th:text="${#authentication.name}">User</span>
                <form th:action="@{/logout}" method="post" style="display:inline;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" class="ms-3 btn btn-sm btn-outline-danger"><i class="fas fa-sign-out-alt"></i> Logout</button>
                </form>
            </div>
        </div>

        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="row">
            <div class="col-md-3" th:if="${isAdmin or isReceptionist or isDoctor or isNurse}">
                <div class="stat-card bg-blue">
                    <div class="d-flex justify-content-between">
                        <div><div class="number" th:text="${totalPatients}">0</div><div class="label">Total Patients</div></div>
                        <i class="fas fa-user-injured"></i>
                    </div>
                </div>
            </div>
            <div class="col-md-3" th:if="${isAdmin or isReceptionist}">
                <div class="stat-card bg-green">
                    <div class="d-flex justify-content-between">
                        <div><div class="number" th:text="${totalDoctors}">0</div><div class="label">Total Doctors</div></div>
                        <i class="fas fa-user-md"></i>
                    </div>
                </div>
            </div>
            <div class="col-md-3" th:if="${isAdmin or isDoctor or isReceptionist}">
                <div class="stat-card bg-orange">
                    <div class="d-flex justify-content-between">
                        <div><div class="number" th:text="${totalPrescriptions}">0</div><div class="label">Prescriptions</div></div>
                        <i class="fas fa-prescription"></i>
                    </div>
                </div>
            </div>
            <div class="col-md-3" th:if="${isAdmin or isReceptionist}">
                <div class="stat-card bg-teal">
                    <div class="d-flex justify-content-between">
                        <div><div class="number" th:text="${totalBills}">0</div><div class="label">Total Bills</div></div>
                        <i class="fas fa-file-invoice-dollar"></i>
                    </div>
                </div>
            </div>
            <div class="col-md-3" th:if="${isAdmin or isDoctor or isReceptionist or isNurse}">
                <div class="stat-card bg-purple">
                    <div class="d-flex justify-content-between">
                        <div><div class="number" th:text="${scheduledAppointments}">0</div><div class="label">Scheduled Appointments</div></div>
                        <i class="fas fa-calendar-check"></i>
                    </div>
                </div>
            </div>
            <div class="col-md-3" th:if="${isAdmin or isReceptionist}">
                <div class="stat-card bg-red">
                    <div class="d-flex justify-content-between">
                        <div><div class="number" th:text="${pendingBills}">0</div><div class="label">Pending Bills</div></div>
                        <i class="fas fa-clock"></i>
                    </div>
                </div>
            </div>
            <div class="col-md-3" th:if="${isAdmin or isNurse or isReceptionist}">
                <div class="stat-card bg-dark-blue">
                    <div class="d-flex justify-content-between">
                        <div><div class="number" th:text="${availableRooms}">0</div><div class="label">Available Rooms</div></div>
                        <i class="fas fa-door-open"></i>
                    </div>
                </div>
            </div>
            <div class="col-md-3" th:if="${isAdmin or isNurse or isReceptionist}">
                <div class="stat-card bg-warm">
                    <div class="d-flex justify-content-between">
                        <div><div class="number" th:text="${availableBeds}">0</div><div class="label">Available Beds</div></div>
                        <i class="fas fa-bed"></i>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-4" sec:authorize="hasRole('ADMIN') or hasRole('RECEPTIONIST')">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header bg-white"><h5 class="mb-0"><i class="fas fa-link me-2" style="color:#13c5dd;"></i>Quick Actions</h5></div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-3 mb-2"><a href="/dashboard/pregister" class="btn btn-outline-primary w-100"><i class="fas fa-user-injured"></i> New Patient</a></div>
                            <div class="col-md-3 mb-2" sec:authorize="hasRole('ADMIN')"><a href="/dashboard/dRegistration" class="btn btn-outline-success w-100"><i class="fas fa-user-md"></i> New Doctor</a></div>
                            <div class="col-md-3 mb-2"><a href="/dashboard/appointments" class="btn btn-outline-info w-100"><i class="fas fa-calendar-plus"></i> Appointments</a></div>
                            <div class="col-md-3 mb-2"><a href="/dashboard/patientbillRegistration" class="btn btn-outline-warning w-100"><i class="fas fa-file-invoice"></i> New Bill</a></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
