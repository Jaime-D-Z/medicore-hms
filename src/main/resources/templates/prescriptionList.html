<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Todas las Recetas - MediCore HMS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="main-content">
        <div class="topbar">
            <h4><i class="fas fa-prescription"></i>Todas las Recetas</h4>
            <div class="user-info">
                <i class="fas fa-user-circle"></i>
                <span th:text="${#authentication.name}">Usuario</span>
                <form th:action="@{/logout}" method="post" style="display:inline;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" class="btn btn-sm btn-outline-danger ms-2"><i class="fas fa-sign-out-alt"></i> Salir</button>
                </form>
            </div>
        </div>
        <div style="padding: 24px 30px;">
            <div class="card">
                <div class="card-header">
                    <h5><i class="fas fa-list"></i>Todas las Recetas</h5>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead>
                                <tr><th>ID</th><th>Paciente</th><th>Doctor</th><th>Medicamento</th><th>Dosis</th><th>Días</th><th>Fecha</th><th>Estado</th></tr>
                            </thead>
                            <tbody>
                                <tr th:each="p : ${prescriptions}">
                                    <td th:text="${p.pid}">1</td>
                                    <td th:text="${p.patient.patientName}">Patient</td>
                                    <td th:text="${p.doctor.dName}">Doctor</td>
                                    <td th:text="${p.tablet}">Medicine</td>
                                    <td th:text="${p.dosage}">-</td>
                                    <td th:text="${p.days}">0</td>
                                    <td th:text="${p.prescribedDate}">-</td>
                                    <td><span class="badge bg-success" th:text="${p.status}">ACTIVE</span></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
