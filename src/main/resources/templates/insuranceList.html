<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Seguros - MediCore HMS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="main-content">
        <div class="topbar">
            <h4><i class="fas fa-shield-alt"></i>Seguros</h4>
            <div class="user-info">
                <i class="fas fa-user-circle"></i>
                <span th:text="${#authentication.name}">Usuario</span>
                <form th:action="@{/logout}" method="post" style="display:inline;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" class="btn btn-sm btn-outline-danger ms-2"><i class="fas fa-sign-out-alt"></i> Salir</button>
                </form>
            </div>
        </div>
        <div style="padding: 24px 30px;">
            <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
                <span th:text="${successMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div class="row g-4">
                <div class="col-lg-5">
                    <div class="card">
                        <div class="card-header">
                            <h5><i class="fas fa-plus-circle"></i>
                                <span th:if="${insurance.insuranceId != null}">Editar</span>
                                <span th:unless="${insurance.insuranceId != null}">Nuevo</span> Seguro
                            </h5>
                        </div>
                        <div class="card-body">
                            <form th:action="@{/dashboard/insuranceSave}" method="post">
                                <input type="hidden" name="insuranceId" th:value="${insurance.insuranceId}">
                                <div class="mb-3">
                                    <label class="form-label">Paciente</label>
                                    <select name="patientId" class="form-select" required>
                                        <option value="">Seleccionar Paciente</option>
                                        <option th:each="p : ${patients}" th:value="${p.patientId}" th:text="${p.patientName}" th:selected="${insurance.patient?.patientId == p.patientId}"></option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Nombre Proveedor</label>
                                    <input type="text" name="providerName" class="form-control" th:value="${insurance.providerName}" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Núm. Póliza</label>
                                    <input type="text" name="policyNumber" class="form-control" th:value="${insurance.policyNumber}">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Tipo Cobertura</label>
                                    <input type="text" name="coverageType" class="form-control" th:value="${insurance.coverageType}">
                                </div>
                                <div class="row g-3 mb-3">
                                    <div class="col-md-6">
                                        <label class="form-label">Fecha Inicio</label>
                                        <input type="date" name="startDate" class="form-control" th:value="${insurance.startDate}">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">Fecha Fin</label>
                                        <input type="date" name="endDate" class="form-control" th:value="${insurance.endDate}">
                                    </div>
                                </div>
                                <button type="submit" class="btn btn-primary w-100"><i class="fas fa-save"></i> Guardar Seguro</button>
                            </form>
                        </div>
                    </div>
                </div>
                <div class="col-lg-7">
                    <div class="card">
                        <div class="card-header">
                            <h5><i class="fas fa-list"></i>Todos los Seguros</h5>
                        </div>
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover mb-0">
                                    <thead>
                                        <tr><th>Paciente</th><th>Proveedor</th><th>Póliza #</th><th>Cobertura</th><th>Válido Hasta</th><th>Acciones</th></tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="i : ${insurances}">
                                            <td th:text="${i.patient.patientName}">Patient</td>
                                            <td th:text="${i.providerName}">Provider</td>
                                            <td th:text="${i.policyNumber}">-</td>
                                            <td th:text="${i.coverageType}">-</td>
                                            <td th:text="${i.endDate}">-</td>
                                            <td>
                                                <a th:href="@{/dashboard/editInsurance/{id}(id=${i.insuranceId})}" class="btn btn-sm btn-warning"><i class="fas fa-edit"></i></a>
                                                <a th:href="@{/dashboard/deleteInsurance/{id}(id=${i.insuranceId})}" class="btn btn-sm btn-danger" onclick="return confirm('¿Eliminar?')"><i class="fas fa-trash"></i></a>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
