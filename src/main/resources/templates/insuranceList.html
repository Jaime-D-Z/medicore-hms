<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="utf-8"><title>Insurance - HMS</title><meta name="viewport" content="width=device-width, initial-scale=1.0"><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<div class="main-content">
<div class="topbar"><h4><i class="fas fa-shield-alt" style="color:#13c5dd;margin-right:10px;"></i>Insurance</h4><div class="user-info"><i class="fas fa-user-circle"></i> <span th:text="${#authentication.name}">User</span> <a href="/logout" class="ms-3 btn btn-sm btn-outline-danger"><i class="fas fa-sign-out-alt"></i> Logout</a></div></div>
<div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show"><span th:text="${successMessage}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
<div class="row">
<div class="col-md-5"><div class="card"><div class="card-header bg-white"><h5 class="mb-0">Insurance Record</h5></div><div class="card-body"><form th:action="@{/dashboard/insuranceSave}" method="post"><input type="hidden" name="insuranceId" th:value="${insurance.insuranceId}"><div class="mb-2"><select name="patientId" class="form-select" required><option value="">Select Patient</option><option th:each="p : ${patients}" th:value="${p.patientId}" th:text="${p.patientName}" th:selected="${insurance.patient?.patientId == p.patientId}"></option></select></div><div class="mb-2"><input type="text" name="providerName" class="form-control" placeholder="Provider Name" th:value="${insurance.providerName}" required></div><div class="mb-2"><input type="text" name="policyNumber" class="form-control" placeholder="Policy Number" th:value="${insurance.policyNumber}"></div><div class="mb-2"><input type="text" name="coverageType" class="form-control" placeholder="Coverage Type" th:value="${insurance.coverageType}"></div><div class="mb-2"><label>Start Date</label><input type="date" name="startDate" class="form-control" th:value="${insurance.startDate}"></div><div class="mb-2"><label>End Date</label><input type="date" name="endDate" class="form-control" th:value="${insurance.endDate}"></div><button type="submit" class="btn btn-primary w-100"><i class="fas fa-save"></i> Save</button></form></div></div></div>
<div class="col-md-7"><div class="card"><div class="card-body"><div class="table-responsive"><table class="table table-hover"><thead><tr><th>Patient</th><th>Provider</th><th>Policy #</th><th>Coverage</th><th>Valid Until</th><th>Actions</th></tr></thead><tbody><tr th:each="i : ${insurances}"><td th:text="${i.patient.patientName}">Patient</td><td th:text="${i.providerName}">Provider</td><td th:text="${i.policyNumber}">-</td><td th:text="${i.coverageType}">-</td><td th:text="${i.endDate}">-</td><td><a th:href="@{/dashboard/deleteInsurance/{id}(id=${i.insuranceId})}" class="btn btn-sm btn-danger" onclick="return confirm('Delete?')"><i class="fas fa-trash"></i></a></td></tr></tbody></table></div></div></div></div></div>
</div>
<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
