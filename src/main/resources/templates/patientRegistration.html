<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="utf-8"><title>Patient Registration - HMS</title><meta name="viewport" content="width=device-width, initial-scale=1.0"><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<div class="main-content">
<div class="topbar"><h4><i class="fas fa-user-injured" style="color:#13c5dd;margin-right:10px;"></i>Patient Registration</h4><div class="user-info"><i class="fas fa-user-circle"></i> <span th:text="${#authentication.name}">User</span> <a href="/logout" class="ms-3 btn btn-sm btn-outline-danger"><i class="fas fa-sign-out-alt"></i> Logout</a></div></div>
<div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show"><span th:text="${successMessage}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
<div class="row">
<div class="col-md-5"><div class="card"><div class="card-header bg-white"><h5 class="mb-0"><i class="fas fa-plus-circle me-2" style="color:#13c5dd;"></i><span th:if="${patient.patientId != null}">Edit</span><span th:unless="${patient.patientId != null}">New</span> Patient</h5></div><div class="card-body"><form th:action="@{/dashboard/pregistersubmit}" method="post"><input type="hidden" name="patientId" th:value="${patient.patientId}">
<div class="mb-2"><input type="text" name="patientName" class="form-control" placeholder="Full Name" th:value="${patient.patientName}" required></div>
<div class="row mb-2"><div class="col"><input type="number" name="age" class="form-control" placeholder="Age" th:value="${patient.age}"></div><div class="col"><select name="gender" class="form-select"><option value="Male" th:selected="${patient.gender == 'Male'}">Male</option><option value="Female" th:selected="${patient.gender == 'Female'}">Female</option><option value="Other" th:selected="${patient.gender == 'Other'}">Other</option></select></div></div>
<div class="mb-2"><input type="text" name="phone" class="form-control" placeholder="Phone" th:value="${patient.phone}"></div>
<div class="mb-2"><input type="email" name="email" class="form-control" placeholder="Email" th:value="${patient.email}"></div>
<div class="mb-2"><textarea name="address" class="form-control" placeholder="Address" th:text="${patient.address}"></textarea></div>
<div class="mb-2"><label class="form-label">Admission Date</label><input type="date" name="admissionDate" class="form-control" th:value="${#dates.format(patient.admissionDate, 'yyyy-MM-dd')}"></div>
<div class="mb-2"><input type="number" step="0.01" name="patientAmt" class="form-control" placeholder="Initial Payment" th:value="${patient.patientAmt}"></div>
<button type="submit" class="btn btn-primary w-100"><i class="fas fa-save"></i> Save</button>
</form></div></div></div>
<div class="col-md-7"><div class="card"><div class="card-body"><div class="table-responsive"><table class="table table-hover"><thead><tr><th>Name</th><th>Age</th><th>Gender</th><th>Phone</th><th>Admission</th><th>Actions</th></tr></thead><tbody><tr th:each="p : ${latestPatients}"><td th:text="${p.patientName}">Name</td><td th:text="${p.age}">25</td><td th:text="${p.gender}">M</td><td th:text="${p.phone}">-</td><td th:text="${p.admissionDate}">-</td><td><a th:href="@{/dashboard/editPatient/{id}(id=${p.patientId})}" class="btn btn-sm btn-warning"><i class="fas fa-edit"></i></a> <a th:href="@{/dashboard/deletePatient/{id}(id=${p.patientId})}" class="btn btn-sm btn-danger" onclick="return confirm('Delete this patient?')"><i class="fas fa-trash"></i></a></td></tr></tbody></table></div></div></div></div></div>
</div>
<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
