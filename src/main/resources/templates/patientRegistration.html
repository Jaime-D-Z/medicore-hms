<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Registro de Paciente - MediCore HMS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="main-content">
        <div class="topbar">
            <h4><i class="fas fa-user-injured"></i>Registro de Paciente</h4>
            <div class="user-info">
                <i class="fas fa-user-circle"></i>
                <span th:text="${#authentication.name}">Usuario</span>
                <form th:action="@{/logout}" method="post" style="display:inline;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" class="btn btn-sm btn-outline-danger ms-2"><i class="fas fa-sign-out-alt"></i> Salir</button>
                </form>
            </div>
        </div>
        <div style="padding: 24px 30px;">
            <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
                <span th:text="${successMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div class="row g-4">
                <div class="col-lg-5">
                    <div class="card">
                        <div class="card-header">
                            <h5><i class="fas fa-plus-circle"></i>
                                <span th:if="${patient.patientId != null}">Editar</span>
                                <span th:unless="${patient.patientId != null}">Nuevo</span> Paciente
                            </h5>
                        </div>
                        <div class="card-body">
                            <form th:action="@{/dashboard/pregistersubmit}" method="post">
                                <input type="hidden" name="patientId" th:value="${patient.patientId}">
                                <div class="mb-3">
                                    <input type="text" name="patientName" class="form-control" placeholder="Nombre Completo" th:value="${patient.patientName}" required>
                                </div>
                                <div class="row g-3 mb-3">
                                    <div class="col-md-6">
                                        <input type="number" name="age" class="form-control" placeholder="Edad" th:value="${patient.age}">
                                    </div>
                                    <div class="col-md-6">
                                        <select name="gender" class="form-select">
                                            <option value="Male" th:selected="${patient.gender == 'Male'}">Masculino</option>
                                            <option value="Female" th:selected="${patient.gender == 'Female'}">Femenino</option>
                                            <option value="Other" th:selected="${patient.gender == 'Other'}">Otro</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <input type="text" name="phone" class="form-control" placeholder="Teléfono" th:value="${patient.phone}">
                                </div>
                                <div class="mb-3">
                                    <input type="email" name="email" class="form-control" placeholder="Correo" th:value="${patient.email}">
                                </div>
                                <div class="mb-3">
                                    <textarea name="address" class="form-control" placeholder="Dirección" rows="2" th:text="${patient.address}"></textarea>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Fecha de Ingreso</label>
                                    <input type="date" name="admissionDate" class="form-control" th:value="${patient.admissionDate != null ? #dates.format(patient.admissionDate, 'yyyy-MM-dd') : ''}">
                                </div>
                                <div class="mb-3">
                                    <input type="number" step="0.01" name="patientAmt" class="form-control" placeholder="Pago Inicial" th:value="${patient.patientAmt}">
                                </div>
                                <button type="submit" class="btn btn-primary w-100"><i class="fas fa-save"></i> Guardar Paciente</button>
                            </form>
                        </div>
                    </div>
                </div>
                <div class="col-lg-7">
                    <div class="card">
                        <div class="card-header">
                            <h5><i class="fas fa-list"></i>Ãšltimos Pacientes</h5>
                        </div>
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover mb-0">
                                    <thead>
                                        <tr><th>Nombre</th><th>Edad</th><th>Género</th><th>Teléfono</th><th>Ingreso</th><th>Acciones</th></tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="p : ${latestPatients}">
                                            <td th:text="${p.patientName}">Name</td>
                                            <td th:text="${p.age}">25</td>
                                            <td th:text="${p.gender}">M</td>
                                            <td th:text="${p.phone}">-</td>
                                            <td th:text="${p.admissionDate}">-</td>
                                            <td>
                                                <a th:href="@{/dashboard/editPatient/{id}(id=${p.patientId})}" class="btn btn-sm btn-warning"><i class="fas fa-edit"></i></a>
                                                <a th:href="@{/dashboard/deletePatient/{id}(id=${p.patientId})}" class="btn btn-sm btn-danger" onclick="return confirm('¿Eliminar este paciente?')"><i class="fas fa-trash"></i></a>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
