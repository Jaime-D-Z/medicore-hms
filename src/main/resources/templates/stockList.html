<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="utf-8"><title>Stock - HMS</title><meta name="viewport" content="width=device-width, initial-scale=1.0"><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<div class="main-content">
<div class="topbar"><h4><i class="fas fa-boxes" style="color:#13c5dd;margin-right:10px;"></i>Stock Inventory</h4><div class="user-info"><i class="fas fa-user-circle"></i> <span th:text="${#authentication.name}">User</span> <a href="/logout" class="ms-3 btn btn-sm btn-outline-danger"><i class="fas fa-sign-out-alt"></i> Logout</a></div></div>
<div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show"><span th:text="${successMessage}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
<div class="row">
<div class="col-md-4"><div class="card"><div class="card-header bg-white"><h5 class="mb-0">Stock Entry</h5></div><div class="card-body"><form th:action="@{/dashboard/stockSave}" method="post"><input type="hidden" name="stockId" th:value="${stock.stockId}"><div class="mb-2"><label class="form-label">Medicine</label><select name="medicineId" class="form-select" required><option value="">Select</option><option th:each="m : ${medicines}" th:value="${m.medicineId}" th:text="${m.name}" th:selected="${stock.medicine?.medicineId == m.medicineId}"></option></select></div><div class="mb-2"><label class="form-label">Supplier</label><select name="supplierId" class="form-select"><option value="">Select</option><option th:each="s : ${suppliers}" th:value="${s.supplierId}" th:text="${s.name}" th:selected="${stock.supplier?.supplierId == s.supplierId}"></option></select></div><div class="mb-2"><label class="form-label">Quantity</label><input type="number" name="quantity" class="form-control" th:value="${stock.quantity}" required></div><div class="mb-2"><label class="form-label">Expiry Date</label><input type="date" name="expiryDate" class="form-control" th:value="${stock.expiryDate}"></div><button type="submit" class="btn btn-primary w-100"><i class="fas fa-save"></i> Save</button></form></div></div></div>
<div class="col-md-8"><div class="card"><div class="card-body"><div class="table-responsive"><table class="table table-hover"><thead><tr><th>Medicine</th><th>Supplier</th><th>Qty</th><th>Expiry</th><th>Last Restocked</th><th>Actions</th></tr></thead><tbody><tr th:each="s : ${stockList}"><td th:text="${s.medicine?.name}">Med</td><td th:text="${s.supplier?.name}">Sup</td><td th:text="${s.quantity}">0</td><td th:text="${s.expiryDate}">-</td><td th:text="${s.lastRestocked}">-</td><td><a th:href="@{/dashboard/editStock/{id}(id=${s.stockId})}" class="btn btn-sm btn-warning"><i class="fas fa-edit"></i></a> <a th:href="@{/dashboard/deleteStock/{id}(id=${s.stockId})}" class="btn btn-sm btn-danger" onclick="return confirm('Delete?')"><i class="fas fa-trash"></i></a></td></tr></tbody></table></div></div></div></div></div>
</div>
<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
