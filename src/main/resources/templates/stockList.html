<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Inventario - MediCore HMS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="main-content">
        <div class="topbar">
            <h4><i class="fas fa-boxes"></i>Inventario</h4>
            <div class="user-info">
                <i class="fas fa-user-circle"></i>
                <span th:text="${#authentication.name}">Usuario</span>
                <form th:action="@{/logout}" method="post" style="display:inline;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" class="btn btn-sm btn-outline-danger ms-2"><i class="fas fa-sign-out-alt"></i> Salir</button>
                </form>
            </div>
        </div>
        <div style="padding: 24px 30px;">
            <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
                <span th:text="${successMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div class="row g-4">
                <div class="col-lg-4">
                    <div class="card">
                        <div class="card-header">
                            <h5><i class="fas fa-plus-circle"></i>Entrada de Inventario</h5>
                        </div>
                        <div class="card-body">
                            <form th:action="@{/dashboard/stockSave}" method="post">
                                <input type="hidden" name="stockId" th:value="${stock.stockId}">
                                <div class="mb-3">
<label class="form-label">Medicamento</label>
                                     <select name="medicineId" class="form-select" required>
                                         <option value="">Seleccionar</option>
                                        <option th:each="m : ${medicines}" th:value="${m.medicineId}" th:text="${m.name}" th:selected="${stock.medicine?.medicineId == m.medicineId}"></option>
                                    </select>
                                </div>
                                <div class="mb-3">
<label class="form-label">Proveedor</label>
                                     <select name="supplierId" class="form-select">
                                         <option value="">Seleccionar</option>
                                        <option th:each="s : ${suppliers}" th:value="${s.supplierId}" th:text="${s.name}" th:selected="${stock.supplier?.supplierId == s.supplierId}"></option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Cantidad</label>
                                    <input type="number" name="quantity" class="form-control" th:value="${stock.quantity}" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Fecha Venc.</label>
                                    <input type="date" name="expiryDate" class="form-control" th:value="${stock.expiryDate}">
                                </div>
                                <button type="submit" class="btn btn-primary w-100"><i class="fas fa-save"></i> Guardar</button>
                            </form>
                        </div>
                    </div>
                </div>
                <div class="col-lg-8">
                    <div class="card">
                        <div class="card-header">
                            <h5><i class="fas fa-list"></i>Todo el Inventario</h5>
                        </div>
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover mb-0">
                                    <thead>
                                        <tr><th>Medicamento</th><th>Proveedor</th><th>Cant.</th><th>Venc.</th><th>Ãšlt. Reposición</th><th>Acciones</th></tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="s : ${stockList}">
                                            <td th:text="${s.medicine?.name}">Med</td>
                                            <td th:text="${s.supplier?.name}">Sup</td>
                                            <td><span class="badge bg-info" th:text="${s.quantity}">0</span></td>
                                            <td th:text="${s.expiryDate}">-</td>
                                            <td th:text="${s.lastRestocked}">-</td>
                                            <td>
                                                <a th:href="@{/dashboard/editStock/{id}(id=${s.stockId})}" class="btn btn-sm btn-warning"><i class="fas fa-edit"></i></a>
                                                <a th:href="@{/dashboard/deleteStock/{id}(id=${s.stockId})}" class="btn btn-sm btn-danger" onclick="return confirm('¿Eliminar?')"><i class="fas fa-trash"></i></a>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
