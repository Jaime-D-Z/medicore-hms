<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="utf-8"><title>Lab Tests - HMS</title><meta name="viewport" content="width=device-width, initial-scale=1.0"><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<div class="main-content">
<div class="topbar"><h4><i class="fas fa-flask" style="color:#13c5dd;margin-right:10px;"></i>Lab Tests</h4><div class="user-info"><i class="fas fa-user-circle"></i> <span th:text="${#authentication.name}">User</span> <a href="/logout" class="ms-3 btn btn-sm btn-outline-danger"><i class="fas fa-sign-out-alt"></i> Logout</a></div></div>
<div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show"><span th:text="${successMessage}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
<div class="row">
<div class="col-md-4"><div class="card"><div class="card-header bg-white"><h5 class="mb-0">Lab Test</h5></div><div class="card-body"><form th:action="@{/dashboard/labTestSave}" method="post"><input type="hidden" name="testId" th:value="${labTest.testId}"><div class="mb-2"><input type="text" name="testName" class="form-control" placeholder="Test Name" th:value="${labTest.testName}" required></div><div class="mb-2"><input type="text" name="category" class="form-control" placeholder="Category" th:value="${labTest.category}"></div><div class="mb-2"><input type="number" step="0.01" name="price" class="form-control" placeholder="Price" th:value="${labTest.price}"></div><div class="mb-2"><textarea name="description" class="form-control" placeholder="Description" th:text="${labTest.description}"></textarea></div><button type="submit" class="btn btn-primary w-100"><i class="fas fa-save"></i> Save</button></form></div></div></div>
<div class="col-md-8"><div class="card"><div class="card-body"><div class="table-responsive"><table class="table table-hover"><thead><tr><th>Name</th><th>Category</th><th>Price</th><th>Actions</th></tr></thead><tbody><tr th:each="t : ${labTests}"><td th:text="${t.testName}">Test</td><td th:text="${t.category}">-</td><td th:text="${t.price}">0</td><td><a th:href="@{/dashboard/editLabTest/{id}(id=${t.testId})}" class="btn btn-sm btn-warning"><i class="fas fa-edit"></i></a> <a th:href="@{/dashboard/deleteLabTest/{id}(id=${t.testId})}" class="btn btn-sm btn-danger" onclick="return confirm('Delete?')"><i class="fas fa-trash"></i></a></td></tr></tbody></table></div></div></div></div></div>
</div>
<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
