<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="utf-8"><title>Medical Record - HMS</title><meta name="viewport" content="width=device-width, initial-scale=1.0"><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet"><style>.detail-box{background:#f8f9fa;border-radius:10px;padding:20px;margin-bottom:15px;border-left:4px solid #13c5dd}</style></head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<div class="main-content">
<div class="topbar"><h4><i class="fas fa-notes-medical" style="color:#13c5dd;margin-right:10px;"></i>Medical Record Detail</h4><div class="user-info"><i class="fas fa-user-circle"></i> <span th:text="${#authentication.name}">User</span> <a href="/logout" class="ms-3 btn btn-sm btn-outline-danger"><i class="fas fa-sign-out-alt"></i> Logout</a></div></div>
<div class="card"><div class="card-body">
<div class="row"><div class="col-md-6"><div class="detail-box"><strong>Patient:</strong> <span th:text="${record.patient.patientName}">Patient</span></div></div>
<div class="col-md-6"><div class="detail-box"><strong>Doctor:</strong> <span th:text="${record.doctor.dName}">Doctor</span></div></div>
<div class="col-md-6"><div class="detail-box"><strong>Visit Date:</strong> <span th:text="${record.visitDate}">-</span></div></div></div>
<div class="detail-box"><h6>Symptoms</h6><p th:text="${record.symptoms}">-</p></div>
<div class="detail-box"><h6>Diagnosis</h6><p th:text="${record.diagnosis}">-</p></div>
<div class="detail-box"><h6>Treatment</h6><p th:text="${record.treatment}">-</p></div>
<div class="detail-box"><h6>Notes</h6><p th:text="${record.notes}">-</p></div>
<a href="/dashboard/medicalRecords" class="btn btn-primary"><i class="fas fa-arrow-left"></i> Back</a>
</div></div>
</div>
<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
