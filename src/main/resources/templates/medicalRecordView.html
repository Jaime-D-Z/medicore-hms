<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Historial Médico - MediCore HMS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="main-content">
        <div class="topbar">
            <h4><i class="fas fa-notes-medical"></i>Detalle del Historial</h4>
            <div class="user-info">
                <i class="fas fa-user-circle"></i>
                <span th:text="${#authentication.name}">Usuario</span>
                <form th:action="@{/logout}" method="post" style="display:inline;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" class="btn btn-sm btn-outline-danger ms-2"><i class="fas fa-sign-out-alt"></i> Salir</button>
                </form>
            </div>
        </div>
        <div style="padding: 24px 30px;">
            <div class="card">
                <div class="card-header">
                    <h5><i class="fas fa-file-medical"></i>Detalles del Historial</h5>
                </div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <div class="detail-box">
                                <strong>Paciente:</strong> <span th:text="${record.patient.patientName}">Patient</span>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="detail-box">
                                <strong>Doctor:</strong> <span th:text="${record.doctor.dName}">Doctor</span>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="detail-box">
                                <strong>Fecha Visita:</strong> <span th:text="${record.visitDate}">-</span>
                            </div>
                        </div>
                    </div>
                    <div class="detail-box">
                        <h6>Síntomas</h6>
                        <p th:text="${record.symptoms}">-</p>
                    </div>
                    <div class="detail-box">
                        <h6>Diagnóstico</h6>
                        <p th:text="${record.diagnosis}">-</p>
                    </div>
                    <div class="detail-box">
                        <h6>Tratamiento</h6>
                        <p th:text="${record.treatment}">-</p>
                    </div>
                    <div class="detail-box">
                        <h6>Notas</h6>
                        <p th:text="${record.notes}">-</p>
                    </div>
                    <a href="/dashboard/medicalRecords" class="btn btn-primary"><i class="fas fa-arrow-left"></i> Volver a Historiales</a>
                </div>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
