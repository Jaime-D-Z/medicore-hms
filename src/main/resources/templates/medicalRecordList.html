<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Historial Médico - MediCore HMS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="main-content">
        <div class="topbar">
            <h4><i class="fas fa-notes-medical"></i>Historial Médico</h4>
            <div class="user-info">
                <i class="fas fa-user-circle"></i>
                <span th:text="${#authentication.name}">Usuario</span>
                <form th:action="@{/logout}" method="post" style="display:inline;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" class="btn btn-sm btn-outline-danger ms-2"><i class="fas fa-sign-out-alt"></i> Salir</button>
                </form>
            </div>
        </div>
        <div style="padding: 24px 30px;">
            <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
                <span th:text="${successMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div class="row g-4">
                <div class="col-lg-5">
                    <div class="card">
                        <div class="card-header">
                            <h5><i class="fas fa-plus-circle"></i>
                                <span th:if="${record.recordId != null}">Editar</span>
                                <span th:unless="${record.recordId != null}">Nuevo</span> Historial
                            </h5>
                        </div>
                        <div class="card-body">
                            <form th:action="@{/dashboard/medicalRecordSave}" method="post">
                                <input type="hidden" name="recordId" th:value="${record.recordId}">
                                <div class="mb-3">
                                    <label class="form-label">Patient</label>
                                    <select name="patientId" class="form-select" required>
                                        <option value="">Seleccionar Paciente</option>
                                        <option th:each="p : ${patients}" th:value="${p.patientId}" th:text="${p.patientName}" th:selected="${record.patient?.patientId == p.patientId}"></option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Doctor</label>
                                    <select name="doctorId" class="form-select" required>
                                        <option value="">Seleccionar Doctor</option>
                                        <option th:each="d : ${doctors}" th:value="${d.doctorId}" th:text="${d.dName}" th:selected="${record.doctor?.doctorId == d.doctorId}"></option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Síntomas</label>
                                    <input type="text" name="symptoms" class="form-control" th:value="${record.symptoms}">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Diagnóstico</label>
                                    <textarea name="diagnosis" class="form-control" rows="2" th:text="${record.diagnosis}"></textarea>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Tratamiento</label>
                                    <textarea name="treatment" class="form-control" rows="2" th:text="${record.treatment}"></textarea>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Notas Adicionales</label>
                                    <textarea name="notes" class="form-control" rows="2" th:text="${record.notes}"></textarea>
                                </div>
                                <button type="submit" class="btn btn-primary w-100"><i class="fas fa-save"></i> Guardar Registro</button>
                            </form>
                        </div>
                    </div>
                </div>
                <div class="col-lg-7">
                    <div class="card">
                        <div class="card-header">
                            <h5><i class="fas fa-list"></i>Todos los Historiales</h5>
                        </div>
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover mb-0">
                                    <thead>
                                        <tr><th>Paciente</th><th>Doctor</th><th>Fecha</th><th>Diagnóstico</th><th>Acciones</th></tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="r : ${records}">
                                            <td th:text="${r.patient?.patientName}">Patient</td>
                                            <td th:text="${r.doctor?.dName}">Doctor</td>
                                            <td th:text="${r.visitDate}">-</td>
                                            <td th:text="${r.diagnosis}">-</td>
                                            <td>
                                                <a th:href="@{/dashboard/viewMedicalRecord/{id}(id=${r.recordId})}" class="btn btn-sm btn-info"><i class="fas fa-eye"></i></a>
                                                <a th:href="@{/dashboard/editMedicalRecord/{id}(id=${r.recordId})}" class="btn btn-sm btn-warning"><i class="fas fa-edit"></i></a>
                                                <a th:href="@{/dashboard/deleteMedicalRecord/{id}(id=${r.recordId})}" class="btn btn-sm btn-danger" onclick="return confirm('¿Eliminar?')"><i class="fas fa-trash"></i></a>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
