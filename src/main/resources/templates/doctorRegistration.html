<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Registro de Doctor - MediCore HMS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="main-content">
        <div class="topbar">
            <h4><i class="fas fa-user-md"></i>Registro de Doctor</h4>
            <div class="user-info">
                <i class="fas fa-user-circle"></i>
                <span th:text="${#authentication.name}">Usuario</span>
                <form th:action="@{/logout}" method="post" style="display:inline;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" class="btn btn-sm btn-outline-danger ms-2"><i class="fas fa-sign-out-alt"></i> Salir</button>
                </form>
            </div>
        </div>
        <div style="padding: 24px 30px;">
            <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
                <span th:text="${successMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div class="row g-4">
                <div class="col-lg-5">
                    <div class="card">
                        <div class="card-header">
                            <h5><i class="fas fa-plus-circle"></i>
                                <span th:if="${doctor.doctorId != null}">Editar</span>
                                <span th:unless="${doctor.doctorId != null}">Nuevo</span> Doctor
                            </h5>
                        </div>
                        <div class="card-body">
                            <form th:action="@{/dashboard/dregistersubmit}" method="post">
                                <input type="hidden" name="doctorId" th:value="${doctor.doctorId}">
                                <div class="mb-3">
                                    <input type="text" name="dName" class="form-control" placeholder="Nombre del Doctor" th:value="${doctor.dName}" required>
                                </div>
                                <div class="mb-3">
                                    <input type="text" name="specialization" class="form-control" placeholder="Especialidad" th:value="${doctor.specialization}">
                                </div>
                                <div class="mb-3">
                                    <select name="deptId" class="form-select">
                                        <option value="">Seleccionar Departamento</option>
                                        <option th:each="d : ${departments}" th:value="${d.deptId}" th:text="${d.deptName}" th:selected="${doctor.department?.deptId == d.deptId}"></option>
                                    </select>
                                </div>
                                <div class="row g-3 mb-3">
                                    <div class="col-md-6">
                                        <input type="number" step="0.01" name="consultCharge" class="form-control" placeholder="Costo Consulta" th:value="${doctor.consultCharge}">
                                    </div>
                                    <div class="col-md-6">
                                        <input type="number" step="0.01" name="salary" class="form-control" placeholder="Salario" th:value="${doctor.salary}">
                                    </div>
                                </div>
                                <button type="submit" class="btn btn-primary w-100"><i class="fas fa-save"></i> Guardar Doctor</button>
                            </form>
                        </div>
                    </div>
                </div>
                <div class="col-lg-7">
                    <div class="card">
                        <div class="card-header">
                            <h5><i class="fas fa-list"></i>Ãšltimos Doctores</h5>
                        </div>
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover mb-0">
                                    <thead>
                                        <tr><th>Nombre</th><th>Especialidad</th><th>Consulta</th><th>Salario</th><th>Acciones</th></tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="d : ${latestDoctors}">
                                            <td th:text="${d.dName}">Dr. Name</td>
                                            <td th:text="${d.specialization}">General</td>
                                            <td th:text="${d.consultCharge}">0</td>
                                            <td th:text="${d.salary}">0</td>
                                            <td>
                                                <a th:href="@{/dashboard/editDoctor/{id}(id=${d.doctorId})}" class="btn btn-sm btn-warning"><i class="fas fa-edit"></i></a>
                                                <a th:href="@{/dashboard/deleteDoctor/{id}(id=${d.doctorId})}" class="btn btn-sm btn-danger" onclick="return confirm('¿Eliminar este doctor?')"><i class="fas fa-trash"></i></a>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
