<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="utf-8"><title>Doctor Registration - HMS</title><meta name="viewport" content="width=device-width, initial-scale=1.0"><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<div class="main-content">
<div class="topbar"><h4><i class="fas fa-user-md" style="color:#13c5dd;margin-right:10px;"></i>Doctor Registration</h4><div class="user-info"><i class="fas fa-user-circle"></i> <span th:text="${#authentication.name}">User</span> <a href="/logout" class="ms-3 btn btn-sm btn-outline-danger"><i class="fas fa-sign-out-alt"></i> Logout</a></div></div>
<div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show"><span th:text="${successMessage}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
<div class="row">
<div class="col-md-5"><div class="card"><div class="card-header bg-white"><h5 class="mb-0"><i class="fas fa-plus-circle me-2" style="color:#13c5dd;"></i><span th:if="${doctor.doctorId != null}">Edit</span><span th:unless="${doctor.doctorId != null}">New</span> Doctor</h5></div><div class="card-body"><form th:action="@{/dashboard/dregistersubmit}" method="post"><input type="hidden" name="doctorId" th:value="${doctor.doctorId}">
<div class="mb-2"><input type="text" name="dName" class="form-control" placeholder="Doctor Name" th:value="${doctor.dName}" required></div>
<div class="mb-2"><input type="text" name="specialization" class="form-control" placeholder="Specialization" th:value="${doctor.specialization}"></div>
<div class="mb-2"><select name="deptId" class="form-select"><option value="">Select Department</option><option th:each="d : ${departments}" th:value="${d.deptId}" th:text="${d.deptName}" th:selected="${doctor.department?.deptId == d.deptId}"></option></select></div>
<div class="row mb-2"><div class="col"><input type="number" step="0.01" name="consultCharge" class="form-control" placeholder="Consult Charge" th:value="${doctor.consultCharge}"></div><div class="col"><input type="number" step="0.01" name="salary" class="form-control" placeholder="Salary" th:value="${doctor.salary}"></div></div>
<button type="submit" class="btn btn-primary w-100"><i class="fas fa-save"></i> Save</button></form></div></div></div>
<div class="col-md-7"><div class="card"><div class="card-body"><div class="table-responsive"><table class="table table-hover"><thead><tr><th>Name</th><th>Specialization</th><th>Charge</th><th>Salary</th><th>Actions</th></tr></thead><tbody><tr th:each="d : ${latestDoctors}"><td th:text="${d.dName}">Dr. Name</td><td th:text="${d.specialization}">General</td><td th:text="${d.consultCharge}">0</td><td th:text="${d.salary}">0</td><td><a th:href="@{/dashboard/editDoctor/{id}(id=${d.doctorId})}" class="btn btn-sm btn-warning"><i class="fas fa-edit"></i></a> <a th:href="@{/dashboard/deleteDoctor/{id}(id=${d.doctorId})}" class="btn btn-sm btn-danger" onclick="return confirm('Delete this doctor?')"><i class="fas fa-trash"></i></a></td></tr></tbody></table></div></div></div></div></div>
</div>
<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
