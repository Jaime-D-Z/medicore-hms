<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Citas - MediCore HMS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="main-content">
        <div class="topbar">
            <h4><i class="fas fa-calendar-check"></i>Citas</h4>
            <div class="user-info">
                <i class="fas fa-user-circle"></i>
                <span th:text="${#authentication.name}">Usuario</span>
                <form th:action="@{/logout}" method="post" style="display:inline;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" class="btn btn-sm btn-outline-danger ms-2"><i class="fas fa-sign-out-alt"></i> Salir</button>
                </form>
            </div>
        </div>
        <div style="padding: 24px 30px;">
            <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
                <span th:text="${successMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div class="row g-4">
                <div class="col-lg-5">
                    <div class="card">
                        <div class="card-header">
                            <h5><i class="fas fa-plus-circle"></i>
                                <span th:if="${appointment.appointmentId != null}">Editar</span>
                                <span th:unless="${appointment.appointmentId != null}">Nueva</span> Cita
                            </h5>
                        </div>
                        <div class="card-body">
                            <form th:action="@{/dashboard/appointmentSave}" method="post">
                                <input type="hidden" name="appointmentId" th:value="${appointment.appointmentId}">
                                <div class="mb-3">
                                    <label class="form-label">Paciente</label>
                                    <select name="patientId" class="form-select" required>
                                        <option value="">Seleccionar Paciente</option>
                                        <option th:each="p : ${patients}" th:value="${p.patientId}" th:text="${p.patientName}" th:selected="${appointment.patient?.patientId == p.patientId}"></option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Doctor</label>
                                    <select name="doctorId" class="form-select" required>
                                        <option value="">Seleccionar Doctor</option>
                                        <option th:each="d : ${doctors}" th:value="${d.doctorId}" th:text="${d.dName}" th:selected="${appointment.doctor?.doctorId == d.doctorId}"></option>
                                    </select>
                                </div>
                                <div class="row g-3 mb-3">
                                    <div class="col-md-6">
                                        <label class="form-label">Fecha</label>
                                        <input type="date" name="appointmentDate" class="form-control" th:value="${appointment.appointmentDate}" required>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">Hora</label>
                                        <input type="time" name="appointmentTime" class="form-control" th:value="${appointment.appointmentTime}" required>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Motivo</label>
                                    <textarea name="reason" class="form-control" rows="2" th:text="${appointment.reason}"></textarea>
                                </div>
                                <button type="submit" class="btn btn-primary w-100"><i class="fas fa-save"></i> Guardar Cita</button>
                            </form>
                        </div>
                    </div>
                </div>
                <div class="col-lg-7">
                    <div class="card">
                        <div class="card-header">
                            <h5><i class="fas fa-list"></i>Todas las Citas</h5>
                        </div>
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover mb-0">
                                    <thead>
                                        <tr><th>Paciente</th><th>Doctor</th><th>Fecha</th><th>Hora</th><th>Estado</th><th>Acciones</th></tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="a : ${appointments}">
                                            <td th:text="${a.patient.patientName}">P</td>
                                            <td th:text="${a.doctor.dName}">D</td>
                                            <td th:text="${a.appointmentDate}">-</td>
                                            <td th:text="${a.appointmentTime}">-</td>
                                            <td>
                                                <span th:text="${a.status}"
                                                      th:classappend="${a.status == 'SCHEDULED'} ? 'badge bg-warning' : (${a.status == 'COMPLETED'} ? 'badge bg-success' : 'badge bg-danger')">Status</span>
                                            </td>
                                            <td>
                                                <a th:href="@{/dashboard/editAppointment/{id}(id=${a.appointmentId})}" class="btn btn-sm btn-warning"><i class="fas fa-edit"></i></a>
                                                <a th:href="@{/dashboard/completeAppointment/{id}(id=${a.appointmentId})}" class="btn btn-sm btn-success"><i class="fas fa-check"></i></a>
                                                <a th:href="@{/dashboard/cancelAppointment/{id}(id=${a.appointmentId})}" class="btn btn-sm btn-danger"><i class="fas fa-times"></i></a>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
