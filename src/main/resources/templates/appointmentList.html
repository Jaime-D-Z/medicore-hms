<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="utf-8"><title>Appointments - HMS</title><meta name="viewport" content="width=device-width, initial-scale=1.0"><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<div class="main-content">
<div class="topbar"><h4><i class="fas fa-calendar-check" style="color:#13c5dd;margin-right:10px;"></i>Appointments</h4><div class="user-info"><i class="fas fa-user-circle"></i> <span th:text="${#authentication.name}">User</span> <a href="/logout" class="ms-3 btn btn-sm btn-outline-danger"><i class="fas fa-sign-out-alt"></i> Logout</a></div></div>
<div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show"><span th:text="${successMessage}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
<div class="row">
<div class="col-md-5"><div class="card"><div class="card-header bg-white"><h5 class="mb-0"><i class="fas fa-plus-circle me-2" style="color:#13c5dd;"></i><span th:if="${appointment.appointmentId != null}">Edit</span><span th:unless="${appointment.appointmentId != null}">New</span> Appointment</h5></div><div class="card-body">
<form th:action="@{/dashboard/appointmentSave}" method="post"><input type="hidden" name="appointmentId" th:value="${appointment.appointmentId}">
<div class="mb-2"><label class="form-label">Patient</label><select name="patientId" class="form-select" required><option value="">Select Patient</option><option th:each="p : ${patients}" th:value="${p.patientId}" th:text="${p.patientName}" th:selected="${appointment.patient?.patientId == p.patientId}"></option></select></div>
<div class="mb-2"><label class="form-label">Doctor</label><select name="doctorId" class="form-select" required><option value="">Select Doctor</option><option th:each="d : ${doctors}" th:value="${d.doctorId}" th:text="${d.dName}" th:selected="${appointment.doctor?.doctorId == d.doctorId}"></option></select></div>
<div class="mb-2"><label class="form-label">Date</label><input type="date" name="appointmentDate" class="form-control" th:value="${appointment.appointmentDate}" required></div>
<div class="mb-2"><label class="form-label">Time</label><input type="time" name="appointmentTime" class="form-control" th:value="${appointment.appointmentTime}" required></div>
<div class="mb-2"><label class="form-label">Reason</label><textarea name="reason" class="form-control" th:text="${appointment.reason}"></textarea></div>
<button type="submit" class="btn btn-primary w-100"><i class="fas fa-save"></i> Save</button></form></div></div></div>
<div class="col-md-7"><div class="card"><div class="card-body"><div class="table-responsive"><table class="table table-hover"><thead><tr><th>Patient</th><th>Doctor</th><th>Date</th><th>Time</th><th>Status</th><th>Actions</th></tr></thead><tbody><tr th:each="a : ${appointments}"><td th:text="${a.patient.patientName}">P</td><td th:text="${a.doctor.dName}">D</td><td th:text="${a.appointmentDate}">-</td><td th:text="${a.appointmentTime}">-</td><td><span th:text="${a.status}" th:classappend="${a.status == 'SCHEDULED'} ? 'badge bg-warning' : (${a.status == 'COMPLETED'} ? 'badge bg-success' : 'badge bg-danger')">Status</span></td><td><a th:href="@{/dashboard/editAppointment/{id}(id=${a.appointmentId})}" class="btn btn-sm btn-warning"><i class="fas fa-edit"></i></a> <a th:href="@{/dashboard/completeAppointment/{id}(id=${a.appointmentId})}" class="btn btn-sm btn-success"><i class="fas fa-check"></i></a> <a th:href="@{/dashboard/cancelAppointment/{id}(id=${a.appointmentId})}" class="btn btn-sm btn-danger"><i class="fas fa-times"></i></a></td></tr></tbody></table></div></div></div></div></div>
</div>
<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
