<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Facturación - MediCore HMS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="main-content">
        <div class="topbar">
            <h4><i class="fas fa-file-invoice-dollar"></i>Facturación</h4>
            <div class="user-info">
                <i class="fas fa-user-circle"></i>
                <span th:text="${#authentication.name}">Usuario</span>
                <form th:action="@{/logout}" method="post" style="display:inline;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" class="btn btn-sm btn-outline-danger ms-2"><i class="fas fa-sign-out-alt"></i> Salir</button>
                </form>
            </div>
        </div>
        <div style="padding: 24px 30px;">
            <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
                <span th:text="${successMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div class="row g-4">
                <div class="col-lg-5">
                    <div class="card">
                        <div class="card-header">
                            <h5><i class="fas fa-plus-circle"></i>
                                <span th:if="${patientBill.billId != null}">Editar</span>
                                <span th:unless="${patientBill.billId != null}">Nueva</span> Factura
                            </h5>
                        </div>
                        <div class="card-body">
                            <form th:action="@{/dashboard/billregistersubmit}" method="post">
                                <input type="hidden" name="billId" th:value="${patientBill.billId}">
                                <div class="mb-3">
                                    <label class="form-label">Receta</label>
                                    <select name="prescriptionId" class="form-select" required>
                                        <option value="">Seleccionar Receta</option>
                                        <option th:each="p : ${prescriptionList}" th:value="${p.pid}" th:text="'#' + ${p.pid} + ' - ' + ${p.patient.patientName}" th:selected="${patientBill.prescription?.pid == p.pid}"></option>
                                    </select>
                                </div>
                                <div class="row g-3 mb-3">
                                    <div class="col-md-6">
                                        <label class="form-label">Costo Medicamento</label>
                                        <input type="number" step="0.01" name="medicineCost" class="form-control" placeholder="Costo Medicamento" th:value="${patientBill.medicineCost}" onchange="calcTotal()">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">Cargo Habitación</label>
                                        <input type="number" step="0.01" name="roomCharge" class="form-control" placeholder="Cargo Habitación" th:value="${patientBill.roomCharge}" onchange="calcTotal()">
                                    </div>
                                </div>
                                <div class="row g-3 mb-3">
                                    <div class="col-md-6">
                                        <label class="form-label">Cargo Servicio</label>
                                        <input type="number" step="0.01" name="serviceCharge" class="form-control" placeholder="Cargo Servicio" th:value="${patientBill.serviceCharge}" onchange="calcTotal()">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">Cargo Examen</label>
                                        <input type="number" step="0.01" name="testCharge" class="form-control" placeholder="Cargo Examen" th:value="${patientBill.testCharge}" onchange="calcTotal()">
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Costo Total</label>
                                    <input type="number" step="0.01" name="totalCost" class="form-control" placeholder="Costo Total" th:value="${patientBill.totalCost}" readonly id="totalCost" style="font-weight:700;font-size:1.125rem;background:#f0f7ff;border-color:#93c5fd;">
                                </div>
                                <button type="submit" class="btn btn-primary w-100"><i class="fas fa-save"></i> Guardar Factura</button>
                            </form>
                        </div>
                    </div>
                </div>
                <div class="col-lg-7">
                    <div class="card">
                        <div class="card-header">
                            <h5><i class="fas fa-list"></i>Ãšltimas Facturas</h5>
                        </div>
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover mb-0">
                                    <thead>
                                        <tr><th>Factura #</th><th>Receta</th><th>Medicamento</th><th>Habitación</th><th>Total</th><th>Estado</th><th>Acciones</th></tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="b : ${latestpatientsBill}">
                                            <td th:text="${b.billId}">1</td>
                                            <td th:text="${b.prescription.pid}">#</td>
                                            <td th:text="${b.medicineCost}">0</td>
                                            <td th:text="${b.roomCharge}">0</td>
                                            <td th:text="${b.totalCost}">0</td>
                                            <td><span th:text="${b.status}" class="badge" th:classappend="${b.status == 'PAID'} ? 'bg-success' : 'bg-warning'">UNPAID</span></td>
                                            <td>
                                                <a th:href="@{/dashboard/editBill/{id}(id=${b.billId})}" class="btn btn-sm btn-warning"><i class="fas fa-edit"></i></a>
                                                <a th:href="@{/dashboard/deleteBill/{id}(id=${b.billId})}" class="btn btn-sm btn-danger" onclick="return confirm('¿Eliminar?')"><i class="fas fa-trash"></i></a>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        function calcTotal() {
            var med = parseFloat(document.querySelector('[name=medicineCost]').value) || 0;
            var room = parseFloat(document.querySelector('[name=roomCharge]').value) || 0;
            var serv = parseFloat(document.querySelector('[name=serviceCharge]').value) || 0;
            var test = parseFloat(document.querySelector('[name=testCharge]').value) || 0;
            document.getElementById('totalCost').value = (med + room + serv + test).toFixed(2);
        }
    </script>
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
