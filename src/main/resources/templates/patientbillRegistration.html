<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="utf-8"><title>Billing - HMS</title><meta name="viewport" content="width=device-width, initial-scale=1.0"><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<div class="main-content">
<div class="topbar"><h4><i class="fas fa-file-invoice-dollar" style="color:#13c5dd;margin-right:10px;"></i>Patient Billing</h4><div class="user-info"><i class="fas fa-user-circle"></i> <span th:text="${#authentication.name}">User</span> <a href="/logout" class="ms-3 btn btn-sm btn-outline-danger"><i class="fas fa-sign-out-alt"></i> Logout</a></div></div>
<div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show"><span th:text="${successMessage}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
<div class="row">
<div class="col-md-5"><div class="card"><div class="card-header bg-white"><h5 class="mb-0"><i class="fas fa-plus-circle me-2" style="color:#13c5dd;"></i><span th:if="${patientBill.billId != null}">Edit</span><span th:unless="${patientBill.billId != null}">New</span> Bill</h5></div><div class="card-body"><form th:action="@{/dashboard/billregistersubmit}" method="post"><input type="hidden" name="billId" th:value="${patientBill.billId}">
<div class="mb-2"><select name="prescriptionId" class="form-select" required><option value="">Select Prescription</option><option th:each="p : ${prescriptionList}" th:value="${p.pid}" th:text="'#' + ${p.pid} + ' - ' + ${p.patient.patientName}" th:selected="${patientBill.prescription?.pid == p.pid}"></option></select></div>
<div class="row mb-2"><div class="col"><input type="number" step="0.01" name="medicineCost" class="form-control" placeholder="Medicine Cost" th:value="${patientBill.medicineCost}" onchange="calcTotal()"></div><div class="col"><input type="number" step="0.01" name="roomCharge" class="form-control" placeholder="Room Charge" th:value="${patientBill.roomCharge}" onchange="calcTotal()"></div></div>
<div class="row mb-2"><div class="col"><input type="number" step="0.01" name="serviceCharge" class="form-control" placeholder="Service Charge" th:value="${patientBill.serviceCharge}" onchange="calcTotal()"></div><div class="col"><input type="number" step="0.01" name="testCharge" class="form-control" placeholder="Test Charge" th:value="${patientBill.testCharge}" onchange="calcTotal()"></div></div>
<div class="mb-2"><input type="number" step="0.01" name="totalCost" class="form-control" placeholder="Total Cost" th:value="${patientBill.totalCost}" readonly id="totalCost" style="font-weight:bold;font-size:18px;background:#f0f8ff;"></div>
<button type="submit" class="btn btn-primary w-100"><i class="fas fa-save"></i> Save Bill</button></form></div></div></div>
<div class="col-md-7"><div class="card"><div class="card-body"><div class="table-responsive"><table class="table table-hover"><thead><tr><th>Bill #</th><th>Prescription</th><th>Medicine</th><th>Room</th><th>Total</th><th>Status</th><th>Actions</th></tr></thead><tbody><tr th:each="b : ${latestpatientsBill}"><td th:text="${b.billId}">1</td><td th:text="${b.prescription.pid}">#</td><td th:text="${b.medicineCost}">0</td><td th:text="${b.roomCharge}">0</td><td th:text="${b.totalCost}">0</td><td><span th:text="${b.status}" class="badge" th:classappend="${b.status == 'PAID'} ? 'bg-success' : 'bg-warning'">UNPAID</span></td><td><a th:href="@{/dashboard/editBill/{id}(id=${b.billId})}" class="btn btn-sm btn-warning"><i class="fas fa-edit"></i></a> <a th:href="@{/dashboard/deleteBill/{id}(id=${b.billId})}" class="btn btn-sm btn-danger" onclick="return confirm('Delete?')"><i class="fas fa-trash"></i></a></td></tr></tbody></table></div></div></div></div></div>
</div>
<script>
function calcTotal() {
    var med = parseFloat(document.querySelector('[name=medicineCost]').value) || 0;
    var room = parseFloat(document.querySelector('[name=roomCharge]').value) || 0;
    var serv = parseFloat(document.querySelector('[name=serviceCharge]').value) || 0;
    var test = parseFloat(document.querySelector('[name=testCharge]').value) || 0;
    document.getElementById('totalCost').value = (med + room + serv + test).toFixed(2);
}
</script>
<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
