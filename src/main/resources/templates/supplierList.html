<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Proveedores - MediCore HMS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="main-content">
        <div class="topbar">
            <h4><i class="fas fa-truck"></i>Proveedores</h4>
            <div class="user-info">
                <i class="fas fa-user-circle"></i>
                <span th:text="${#authentication.name}">Usuario</span>
                <form th:action="@{/logout}" method="post" style="display:inline;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" class="btn btn-sm btn-outline-danger ms-2"><i class="fas fa-sign-out-alt"></i> Salir</button>
                </form>
            </div>
        </div>
        <div style="padding: 24px 30px;">
            <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
                <span th:text="${successMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div class="row g-4">
                <div class="col-lg-5">
                    <div class="card">
                        <div class="card-header">
                            <h5><i class="fas fa-plus-circle"></i>Proveedor</h5>
                        </div>
                        <div class="card-body">
                            <form th:action="@{/dashboard/supplierSave}" method="post">
                                <input type="hidden" name="supplierId" th:value="${supplier.supplierId}">
                                <div class="mb-3">
                                    <input type="text" name="name" class="form-control" placeholder="Nombre Empresa" th:value="${supplier.name}" required>
                                </div>
                                <div class="mb-3">
                                    <input type="text" name="contactPerson" class="form-control" placeholder="Contacto" th:value="${supplier.contactPerson}">
                                </div>
                                <div class="row g-3 mb-3">
                                    <div class="col-md-6">
                                        <input type="text" name="phone" class="form-control" placeholder="Teléfono" th:value="${supplier.phone}">
                                    </div>
                                    <div class="col-md-6">
                                        <input type="email" name="email" class="form-control" placeholder="Correo" th:value="${supplier.email}">
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <textarea name="address" class="form-control" placeholder="Dirección" rows="2" th:text="${supplier.address}"></textarea>
                                </div>
                                <button type="submit" class="btn btn-primary w-100"><i class="fas fa-save"></i> Guardar Proveedor</button>
                            </form>
                        </div>
                    </div>
                </div>
                <div class="col-lg-7">
                    <div class="card">
                        <div class="card-header">
                            <h5><i class="fas fa-list"></i>Todos los Proveedores</h5>
                        </div>
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover mb-0">
                                    <thead>
                                        <tr><th>Nombre</th><th>Contacto</th><th>Teléfono</th><th>Correo</th><th>Acciones</th></tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="s : ${suppliers}">
                                            <td th:text="${s.name}">Name</td>
                                            <td th:text="${s.contactPerson}">-</td>
                                            <td th:text="${s.phone}">-</td>
                                            <td th:text="${s.email}">-</td>
                                            <td>
                                                <a th:href="@{/dashboard/editSupplier/{id}(id=${s.supplierId})}" class="btn btn-sm btn-warning"><i class="fas fa-edit"></i></a>
                                                <a th:href="@{/dashboard/deleteSupplier/{id}(id=${s.supplierId})}" class="btn btn-sm btn-danger" onclick="return confirm('¿Eliminar?')"><i class="fas fa-trash"></i></a>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
