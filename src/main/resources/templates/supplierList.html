<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="utf-8"><title>Suppliers - HMS</title><meta name="viewport" content="width=device-width, initial-scale=1.0"><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<div class="main-content">
<div class="topbar"><h4><i class="fas fa-truck" style="color:#13c5dd;margin-right:10px;"></i>Suppliers</h4><div class="user-info"><i class="fas fa-user-circle"></i> <span th:text="${#authentication.name}">User</span> <a href="/logout" class="ms-3 btn btn-sm btn-outline-danger"><i class="fas fa-sign-out-alt"></i> Logout</a></div></div>
<div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show"><span th:text="${successMessage}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
<div class="row">
<div class="col-md-5"><div class="card"><div class="card-header bg-white"><h5 class="mb-0">Supplier</h5></div><div class="card-body"><form th:action="@{/dashboard/supplierSave}" method="post"><input type="hidden" name="supplierId" th:value="${supplier.supplierId}"><div class="mb-2"><input type="text" name="name" class="form-control" placeholder="Company Name" th:value="${supplier.name}" required></div><div class="mb-2"><input type="text" name="contactPerson" class="form-control" placeholder="Contact Person" th:value="${supplier.contactPerson}"></div><div class="mb-2"><input type="text" name="phone" class="form-control" placeholder="Phone" th:value="${supplier.phone}"></div><div class="mb-2"><input type="email" name="email" class="form-control" placeholder="Email" th:value="${supplier.email}"></div><div class="mb-2"><textarea name="address" class="form-control" placeholder="Address" th:text="${supplier.address}"></textarea></div><button type="submit" class="btn btn-primary w-100"><i class="fas fa-save"></i> Save</button></form></div></div></div>
<div class="col-md-7"><div class="card"><div class="card-body"><div class="table-responsive"><table class="table table-hover"><thead><tr><th>Name</th><th>Contact</th><th>Phone</th><th>Email</th><th>Actions</th></tr></thead><tbody><tr th:each="s : ${suppliers}"><td th:text="${s.name}">Name</td><td th:text="${s.contactPerson}">-</td><td th:text="${s.phone}">-</td><td th:text="${s.email}">-</td><td><a th:href="@{/dashboard/editSupplier/{id}(id=${s.supplierId})}" class="btn btn-sm btn-warning"><i class="fas fa-edit"></i></a> <a th:href="@{/dashboard/deleteSupplier/{id}(id=${s.supplierId})}" class="btn btn-sm btn-danger" onclick="return confirm('Delete?')"><i class="fas fa-trash"></i></a></td></tr></tbody></table></div></div></div></div></div>
</div>
<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
